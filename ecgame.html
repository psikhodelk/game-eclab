<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcLab 2.0 | Modern Quiz</title>
    <style>
        @import url('https://fonts.cdnfonts.com');

        :root {
            --bg: #f8f9fa;
            --surface: rgba(255, 255, 255, 0.8);
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --accent: #0071e3;
            --success: #34c759;
            --error: #ff3b30;
            --shadow: 0 8px 30px rgba(0,0,0,0.04);
        }

        * { font-family: 'Multiround Pro', sans-serif; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background: #f5f5f7;
            background-image: radial-gradient(circle at 50% -20%, #e8e8ed 0%, #f5f5f7 100%);
            color: var(--text-main);
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 50px; }
        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; margin: 0;
            letter-spacing: -1px; color: var(--text-main);
        }
        .sub { font-size: 1rem; color: var(--text-sub); letter-spacing: 4px; text-transform: uppercase; margin-top: 8px; font-weight: 700; }

        .stats {
            background: var(--surface); padding: 12px 35px; border-radius: 20px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5);
            margin-bottom: 40px; font-weight: 700; box-shadow: var(--shadow);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 30px; width: 100%; max-width: 1100px; }
        @media (max-width: 450px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--surface); border-radius: 32px; padding: 35px;
            border: 1px solid rgba(255,255,255,0.7); position: relative;
            backdrop-filter: blur(10px); box-shadow: var(--shadow);
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .card:hover { transform: scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }

        .card-name {
            background: transparent; border: none; border-bottom: 2px solid #e5e5e7;
            color: var(--text-main); font-size: 1.6rem; font-weight: 800; width: 100%;
            margin-bottom: 25px; outline: none; padding-bottom: 5px;
        }
        .card-name:focus { border-bottom-color: var(--accent); }

        .card label { font-size: 0.7rem; color: var(--text-sub); text-transform: uppercase; margin-bottom: 6px; display: block; font-weight: 800; }

        .card-mems {
            background: #f5f5f7; border: none; border-radius: 12px;
            color: var(--accent); padding: 10px 15px; width: 100%; margin-bottom: 25px;
            font-weight: 700; outline: none; font-size: 1.1rem;
        }

        .score-box { position: relative; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; }
        .score { font-size: 5.5rem; font-weight: 900; color: var(--text-main); letter-spacing: -3px; }
        .warn-dot { position: absolute; right: 0; top: 10px; font-size: 2rem; }

        .btn-pts-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .btn-p {
            background: #ffffff; border: 1px solid #e5e5e7; color: var(--text-main);
            padding: 14px 0; border-radius: 16px; cursor: pointer; font-weight: 800;
            transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .btn-p:hover { border-color: var(--accent); color: var(--accent); background: #fbfbfd; }
        .btn-p:active { transform: scale(0.95); background: #f5f5f7; }

        .btn-warn {
            grid-column: span 5; margin-top: 15px; cursor: pointer;
            background: #fff; border: 1px solid #f5f5f7; color: var(--text-sub);
            padding: 16px; border-radius: 18px; font-weight: 800; text-transform: uppercase;
            transition: 0.3s; font-size: 0.85rem; letter-spacing: 1px;
        }
        .btn-warn.active { background: #fff2f1; border-color: #ffcfcc; color: var(--error); }

        .controls { display: flex; gap: 15px; margin-top: 60px; }
        .btn-m {
            padding: 20px 40px; border-radius: 100px; border: none; font-weight: 800;
            cursor: pointer; text-transform: uppercase; transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            font-size: 0.9rem; letter-spacing: 1px;
        }
        .btn-add { background: var(--text-main); color: #fff; }
        .btn-res { background: var(--accent); color: #fff; }
        .btn-add:hover, .btn-res:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-rst { background: transparent; color: var(--text-sub); }

        /* Модальное окно */
        #modal {
            display: none; position: fixed; inset: 0; background: rgba(245, 245, 247, 0.8);
            z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(20px);
        }
        .m-box { background: #fff; padding: 50px; border-radius: 40px; width: 90%; max-width: 500px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        .r-row { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid #f5f5f7; font-size: 1.4rem; font-weight: 800; }

        /* Реалистичное конфетти */
        .confetti {
            position: fixed; pointer-events: none; z-index: 9999;
            animation: confetti-fall linear forwards;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotateX(0deg) rotateY(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotateX(720deg) rotateY(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>EcLab 2.0</h1>
        <div class="sub">Панель управления викториной</div>
    </div>

    <div class="stats">УЧАСТНИКОВ ВСЕГО: <span id="total" style="color:var(--accent)">0</span></div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <button class="btn-m btn-add" onclick="add()">+ Добавить команду</button>
        <button class="btn-m btn-res" onclick="finish()">🏆 Показать итоги</button>
        <button class="btn-m btn-rst" onclick="reset()">Сброс</button>
    </div>

    <div id="modal">
        <div class="m-box">
            <h2 style="font-size:2.5rem; margin-top:0; letter-spacing:-1px">Результаты игры</h2>
            <div id="ranks"></div>
            <button class="btn-m btn-add" onclick="closeM()" style="margin-top:30px; width: 100%;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        let teams = JSON.parse(localStorage.getItem('eclab_modern_v1')) || {};

        window.onload = () => {
            const keys = Object.keys(teams);
            if(keys.length === 0) { add(); add(); } 
            else { keys.forEach(id => render(id)); calc(); }
        };

        function save() { localStorage.setItem('eclab_modern_v1', JSON.stringify(teams)); }

        function add() {
            if(Object.keys(teams).length >= 10) return;
            const id = 't' + Date.now();
            teams[id] = { name: '', mems: 0, score: 0, warns: 0 };
            render(id);
            save();
        }

        function render(id) {
            const t = teams[id];
            const div = document.createElement('div');
            div.className = 'card';
            div.id = id;
            const warnText = t.warns === 0 ? "Предупредить" : "Штраф (-20 баллов)";
            const warnClass = t.warns > 0 ? "active" : "";
            
            div.innerHTML = `
                <input type="text" class="card-name" placeholder="Назовите команду..." value="${t.name}" oninput="upd('${id}','name',this.value)">
                <label>Участников в команде</label>
                <input type="number" class="card-mems" min="0" value="${t.mems}" oninput="upd('${id}','mems',this.value); calc()">
                <div class="score-box">
                    <div class="score" id="s-${id}">${t.score}</div>
                    <div class="warn-dot" id="w-${id}">${t.warns > 0 ? '⚠️' : ''}</div>
                </div>
                <div class="btn-pts-grid">
                    ${[10, 20, 30, 40, 50].map(p => `<button class="btn-p" onclick="addPts('${id}', ${p})">+${p}</button>`).join('')}
                    <button class="btn-warn ${warnClass}" id="bw-${id}" onclick="handleWarn('${id}')">${warnText}</button>
                </div>
            `;
            document.getElementById('grid').appendChild(div);
        }

        function upd(id, key, val) {
            teams[id][key] = key === 'mems' ? (parseInt(val) || 0) : val;
            save();
        }

        function addPts(id, p) {
            teams[id].score += p;
            document.getElementById(`s-${id}`).innerText = teams[id].score;
            save();
        }

        function handleWarn(id) {
            teams[id].warns += 1;
            const btn = document.getElementById(`bw-${id}`);
            if (teams[id].warns > 1) {
                teams[id].score -= 20;
                document.getElementById(`s-${id}`).innerText = teams[id].score;
            }
            btn.innerText = "Штраф (-20 баллов)";
            btn.classList.add('active');
            document.getElementById(`w-${id}`).innerText = '⚠️';
            save();
        }

        function calc() {
            const total = Object.values(teams).reduce((s, t) => s + (t.mems || 0), 0);
            document.getElementById('total').innerText = total;
        }

        function finish() {
            const sorted = Object.values(teams).sort((a, b) => b.score - a.score);
            let html = '';
            sorted.forEach((t, i) => {
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1) + '.';
                html += `<div class="r-row"><span>${medal} ${t.name || 'Команда'}</span><span style="color:var(--accent)">${t.score}</span></div>`;
            });
            document.getElementById('ranks').innerHTML = html;
            document.getElementById('modal').style.display = 'flex';
            spawnConfetti();
        }

        function closeM() { document.getElementById('modal').style.display = 'none'; }
        function reset() { if(confirm('Удалить все данные?')) { localStorage.clear(); location.reload(); } }

        function spawnConfetti() {
            const colors = ['#0071e3', '#34c759', '#ff9500', '#ff3b30', '#af52de', '#ff2d55'];
            for(let i=0; i<150; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random()*100+'vw';
                c.style.background = colors[Math.floor(Math.random()*colors.length)];
                
                const size = Math.random() * 10 + 5;
                c.style.width = size + 'px';
                c.style.height = (Math.random() > 0.5 ? size : size / 2) + 'px'; // разные формы
                
                c.style.animationDuration = (Math.random()*3+2)+'s';
                c.style.opacity = Math.random();
                document.body.appendChild(c);
                setTimeout(()=>c.remove(), 5000);
            }
        }
    </script>
</body>
</html>
