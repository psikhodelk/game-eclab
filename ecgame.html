<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcLab 2.0 | Pro Scoreboard</title>
    <!-- ИСПРАВЛЕНО: Полная ссылка на библиотеку фейерверков -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --red: #ff4d4d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #05070a 100%);
            color: white;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            background: linear-gradient(90deg, #90ee90, #00ced1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            margin: 0;
        }

        .stats-bar {
            background: var(--glass);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid var(--border);
            margin: 20px 0 40px;
            color: #94a3b8;
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 колонки по горизонтали */
            gap: 25px;
            width: 100%;
            max-width: 900px;
        }

        @media (max-width: 600px) { .teams-grid { grid-template-columns: 1fr; } }

        .team-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .team-name-input {
            background: transparent; border: none;
            border-bottom: 1px solid var(--border);
            color: white; font-size: 1.3rem; font-weight: 700;
            width: 100%; margin-bottom: 10px; outline: none;
        }

        .members-input {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 8px; color: #64748b; padding: 5px 10px; width: 100%;
            box-sizing: border-box; margin-bottom: 15px;
        }

        .score-display {
            font-size: 4rem; font-weight: 900; text-align: center;
            background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }

        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }

        .btn-pts {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: white; padding: 10px 0; border-radius: 10px; cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-pts:hover { background: white; color: black; }

        .btn-warn {
            grid-column: span 5; margin-top: 15px;
            background: rgba(255, 77, 77, 0.1); border: 1px solid var(--red);
            color: var(--red); padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer;
        }

        .controls { display: flex; gap: 15px; margin-top: 40px; flex-wrap: wrap; justify-content: center; }

        .btn-main {
            padding: 18px 40px; border-radius: 50px; border: none;
            font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s;
        }

        .btn-add { background: white; color: black; }
        .btn-results { background: var(--accent); color: black; }
        .btn-reset { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--border); }

        #modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            z-index: 100; justify-content: center; align-items: center;
        }

        .modal-content {
            background: #111; padding: 40px; border-radius: 30px;
            width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border);
        }

        .rank-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <h1>EcLab 2.0 Викторина</h1>
    
    <div class="stats-bar">Участников всего: <span id="totalMems">0</span></div>

    <div class="teams-grid" id="grid"></div>

    <div class="controls">
        <button class="btn-main btn-add" id="addBtn" onclick="addTeam()">+ Команда</button>
        <button class="btn-main btn-results" onclick="showResults()">ПОДВЕСТИ ИТОГИ</button>
        <button class="btn-main btn-reset" onclick="resetAll()">СБРОСИТЬ ВСЁ</button>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 style="font-size: 2rem">🏆 Результаты</h2>
            <div id="rankList"></div>
            <button onclick="closeModal()" style="margin-top:30px; background:none; color:#555; border:none; cursor:pointer">Закрыть</button>
        </div>
    </div>

    <script>
        let tCount = 0;
        const data = {};

        function addTeam() {
            if (tCount >= 6) return;
            tCount++;
            const id = `t${tCount}`;
            data[id] = { score: 0, warns: 0 };

            const card = document.createElement('div');
            card.className = 'team-card';
            card.id = `card-${id}`;
            card.innerHTML = `
                <input type="text" class="team-name-input" placeholder="Команда ${tCount}">
                <input type="number" class="members-input" placeholder="Кол-во людей" oninput="calc()">
                <div class="score-display" id="score-${id}">0</div>
                <div class="btn-grid">
                    ${[10,20,30,40,50].map(p => `<button class="btn-pts" onclick="upd('${id}',${p})">${p}</button>`).join('')}
                    <button class="btn-warn" onclick="handleWarn('${id}')">ПРЕДУПРЕЖДЕНИЕ (⚠ <span id="w-${id}">0</span>)</button>
                </div>
            `;
            document.getElementById('grid').appendChild(card);
            if(tCount === 6) document.getElementById('addBtn').style.display = 'none';
        }

        function upd(id, v) {
            data[id].score += v;
            document.getElementById(`score-${id}`).innerText = data[id].score;
        }

        function handleWarn(id) {
            data[id].warns++;
            document.getElementById(`w-${id}`).innerText = data[id].warns;
            if(data[id].warns > 1) {
                upd(id, -20);
                document.getElementById(`card-${id}`).style.borderColor = 'red';
                setTimeout(() => document.getElementById(`card-${id}`).style.borderColor = 'rgba(255,255,255,0.1)', 600);
            }
        }

        function calc() {
            let t = 0;
            document.querySelectorAll('.members-input').forEach(i => t += (parseInt(i.value) || 0));
            document.getElementById('totalMems').innerText = t;
        }

        function showResults() {
            const res = [];
            for(let i=1; i<=tCount; i++) {
                const id = `t${i}`;
                const name = document.querySelector(`#card-${id} .team-name-input`).value || `Команда ${i}`;
                res.push({ name, score: data[id].score });
            }
            res.sort((a,b) => b.score - a.score);

            const list = document.getElementById('rankList');
            list.innerHTML = '';
            const medals = ['🥇','🥈','🥉','🎖','🎖','🎖'];
            res.forEach((r, i) => {
                list.innerHTML += `<div class="rank-row"><span>${medals[i]} ${r.name}</span><b>${r.score}</b></div>`;
            });

            document.getElementById('modal').style.display = 'flex';
            
            // ИСПРАВЛЕНО: Функция фейерверка теперь закрыта правильно
            const end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function resetAll() {
            if(confirm("Сбросить все баллы и команды?")) {
                location.reload();
            }
        }

        function closeModal() { 
            document.getElementById('modal').style.display = 'none'; 
        }

        // Автоматический старт с 2 командами
        addTeam(); 
        addTeam();
    </script>
</body>
</html>
