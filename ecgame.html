<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcLab 2.0 | Premium Quiz</title>
    <!-- Подключаем библиотеку конфетти напрямую -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --neon-green: #4ade80;
            --neon-red: #ff4d4d;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #05070a 100%);
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            background: linear-gradient(90deg, #90ee90, #00ced1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        .stats-bar {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            margin-bottom: 40px;
            font-weight: 500;
            color: #94a3b8;
        }

        /* Сетка: 2 колонки по горизонтали */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            width: 100%;
            max-width: 900px;
        }

        @media (max-width: 768px) { .teams-grid { grid-template-columns: 1fr; } }

        .team-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--glass-border);
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .team-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 242, 254, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .team-name-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--glass-border);
            color: #fff;
            font-size: 1.5rem;
            font-weight: 700;
            width: 100%;
            margin-bottom: 15px;
            outline: none;
            padding-bottom: 5px;
        }

        .members-input {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #94a3b8;
            padding: 8px 12px;
            width: 100%;
            margin-bottom: 20px;
        }

        .score-display {
            font-size: 4.5rem;
            font-weight: 900;
            text-align: center;
            margin: 10px 0;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .btn-pts {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 12px 5px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-pts:hover { background: #fff; color: #000; }

        .btn-warn {
            grid-column: span 5;
            margin-top: 15px;
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-warn:active { background: #ff4d4d; color: #fff; }

        .add-btn {
            background: #fff;
            color: #000;
            width: 60px; height: 60px;
            border-radius: 50%;
            font-size: 2rem;
            border: none;
            margin: 40px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .finish-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 20px 60px;
            border-radius: 100px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .finish-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(0, 242, 254, 0.4); }

        #resultModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center; align-items: center;
        }

        .modal-box {
            background: #111;
            padding: 40px;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            width: 90%; max-width: 450px;
            text-align: center;
        }

        .rank-item {
            display: flex; justify-content: space-between;
            padding: 20px; border-bottom: 1px solid var(--glass-border);
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

    <h1>EcLab 2.0 Викторина</h1>
    
    <div class="stats-bar">
        Общее число участников: <span id="totalMems" style="color: #4ade80">0</span>
    </div>

    <div class="teams-grid" id="grid"></div>

    <button class="add-btn" id="addBtn" onclick="addTeam()">+</button>
    
    <button class="finish-btn" onclick="fireworks()">ПОДВЕСТИ ИТОГИ</button>

    <div id="resultModal">
        <div class="modal-box">
            <h2 style="font-size: 2rem; margin-bottom: 25px">🏆 Финал</h2>
            <div id="rankings"></div>
            <button onclick="closeModal()" style="margin-top:30px; background:none; color:#666; border:none; cursor:pointer">Закрыть</button>
        </div>
    </div>

    <script>
        let count = 0;
        const scores = {};
        const warns = {};

        function addTeam() {
            if (count >= 6) return;
            count++;
            const id = `t${count}`;
            scores[id] = 0;
            warns[id] = 0;

            const card = document.createElement('div');
            card.className = 'team-card';
            card.id = `card-${id}`;
            card.innerHTML = `
                <input type="text" class="team-name-input" placeholder="Команда ${count}">
                <input type="number" class="members-input" placeholder="Участников..." oninput="calcTotal()">
                <div class="score-display" id="s-${id}">0</div>
                <div class="btn-grid">
                    <button class="btn-pts" onclick="update('${id}', 10)">+10</button>
                    <button class="btn-pts" onclick="update('${id}', 20)">+20</button>
                    <button class="btn-pts" onclick="update('${id}', 30)">+30</button>
                    <button class="btn-pts" onclick="update('${id}', 40)">+40</button>
                    <button class="btn-pts" onclick="update('${id}', 50)">+50</button>
                    <button class="btn-warn" onclick="warn('${id}')">ПРЕДУПРЕЖДЕНИЕ (⚠ <span id="w-${id}">0</span>)</button>
                </div>
            `;
            document.getElementById('grid').appendChild(card);
            if(count === 6) document.getElementById('addBtn').style.display = 'none';
        }

        function update(id, v) {
            scores[id] += v;
            document.getElementById(`s-${id}`).innerText = scores[id];
        }

        function warn(id) {
            warns[id]++;
            document.getElementById(`w-${id}`).innerText = warns[id];
            if(warns[id] > 1) {
                update(id, -20);
                const c = document.getElementById(`card-${id}`);
                c.style.borderColor = '#ff4d4d';
                setTimeout(() => c.style.borderColor = 'rgba(255,255,255,0.1)', 500);
            }
        }

        function calcTotal() {
            let t = 0;
            document.querySelectorAll('.members-input').forEach(i => t += (parseInt(i.value) || 0));
            document.getElementById('totalMems').innerText = t;
        }

        function fireworks() {
            // Запуск салюта
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#00f2fe', '#4ade80'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#4facfe', '#ffffff'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            // Подсчет результатов
            const res = [];
            document.querySelectorAll('.team-card').forEach((c, i) => {
                const id = `t${i+1}`;
                const name = c.querySelector('.team-name-input').value || `Команда ${i+1}`;
                res.push({ name, score: scores[id] });
            });
            res.sort((a,b) => b.score - a.score);

            const list = document.getElementById('rankings');
            list.innerHTML = '';
            const medals = ['🥇','🥈','🥉','🎖','🎖','🎖'];
            res.forEach((r, i) => {
                list.innerHTML += `<div class="rank-item"><span>${medals[i]} ${r.name}</span><b>${r.score}</b></div>`;
            });

            document.getElementById('resultModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('resultModal').style.display = 'none'; }

        // Инициализация
        addTeam(); addTeam();
    </script>
</body>
</html>
