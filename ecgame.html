<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcLab 2.0 | Ultimate Scoreboard</title>
    <!-- Библиотека конфетти -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root {
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.5);
            --border: rgba(255, 255, 255, 0.1);
            --accent: linear-gradient(90deg, #4ade80, #22d3ee);
            --neon-red: #f43f5e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 100%);
            color: #f8fafc;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            margin: 0 0 10px;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .stats-bar {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 100px;
            border: 1px solid var(--border);
            margin-bottom: 40px;
            font-size: 1.1rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            width: 100%;
            max-width: 1000px;
        }

        @media (max-width: 768px) { .teams-grid { grid-template-columns: 1fr; } }

        .team-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 30px;
            border: 1px solid var(--border);
            transition: all 0.4s ease;
        }

        .team-card:hover {
            border-color: #22d3ee;
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(34, 211, 238, 0.1);
        }

        .team-name-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border);
            color: #fff;
            font-size: 1.6rem;
            font-weight: 800;
            width: 100%;
            margin-bottom: 10px;
            outline: none;
        }

        .label-text { font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; display: block; }

        .members-input {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #4ade80;
            padding: 10px 15px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .score-display {
            font-size: 5rem;
            font-weight: 900;
            text-align: center;
            margin: 10px 0;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.3));
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .btn-pts {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            padding: 15px 0;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-pts:hover { background: #fff; color: #000; transform: scale(1.1); }

        .btn-warn {
            grid-column: span 5;
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            padding: 15px;
            border-radius: 14px;
            font-weight: 800;
            margin-top: 15px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-warn:active { background: var(--neon-red); color: white; }

        .controls { display: flex; gap: 20px; margin-top: 50px; flex-wrap: wrap; justify-content: center; }

        .btn-main {
            padding: 20px 45px;
            border-radius: 100px;
            border: none;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add { background: #fff; color: #000; }
        .btn-results { background: var(--accent); color: #000; box-shadow: 0 0 30px rgba(34, 211, 238, 0.4); }
        .btn-reset { background: transparent; color: #64748b; border: 1px solid var(--border); }
        .btn-reset:hover { color: #f43f5e; border-color: #f43f5e; }

        #modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 1000; justify-content: center; align-items: center;
        }

        .modal-content {
            background: #0f172a; padding: 50px; border-radius: 40px;
            border: 1px solid var(--border); width: 90%; max-width: 450px; text-align: center;
        }

        .rank-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; margin: 10px 0; background: rgba(255,255,255,0.03);
            border-radius: 20px; font-size: 1.4rem;
        }
    </style>
</head>
<body>

    <h1>EcLab 2.0</h1>
    
    <div class="stats-bar">Количество участников (всего): <span id="totalMems" style="color:#4ade80">0</span></div>

    <div class="teams-grid" id="grid"></div>

    <div class="controls">
        <button class="btn-main btn-add" id="addBtn" onclick="addTeam()">+ Команда</button>
        <button class="btn-main btn-results" onclick="showResults()">ПОДВЕСТИ ИТОГИ</button>
        <button class="btn-main btn-reset" onclick="resetAll()">СБРОСИТЬ ВСЁ</button>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 style="font-size: 2.5rem; margin-top:0;">🏆 Финал</h2>
            <div id="rankList"></div>
            <button onclick="closeModal()" style="margin-top:30px; background:none; color:#475569; border:none; cursor:pointer; font-weight:bold;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        let tCount = 0;
        let data = JSON.parse(localStorage.getItem('eclab_data')) || {};

        // Запуск при загрузке
        window.onload = () => {
            const savedCount = Object.keys(data).length;
            if (savedCount === 0) {
                addTeam(); addTeam();
            } else {
                Object.keys(data).forEach(id => renderTeam(id));
                calc();
            }
        };

        function addTeam() {
            if (tCount >= 6) return;
            tCount++;
            const id = `t${Date.now()}`; // Уникальный ID
            data[id] = { name: '', members: 0, score: 0, warns: 0 };
            renderTeam(id);
            save();
        }

        function renderTeam(id) {
            const team = data[id];
            const card = document.createElement('div');
            card.className = 'team-card';
            card.id = `card-${id}`;
            card.innerHTML = `
                <input type="text" class="team-name-input" placeholder="Название команды" value="${team.name}" oninput="updateData('${id}', 'name', this.value)">
                <span class="label-text">Количество участников</span>
                <input type="number" class="members-input" value="${team.members}" oninput="updateData('${id}', 'members', this.value); calc();">
                <div class="score-display" id="score-${id}">${team.score}</div>
                <div class="btn-grid">
                    ${[10,20,30,40,50].map(p => `<button class="btn-pts" onclick="upd('${id}',${p})">${p}</button>`).join('')}
                    <button class="btn-warn" onclick="handleWarn('${id}')">ПРЕДУПРЕЖДЕНИЕ (⚠ <span id="w-${id}">${team.warns}</span>)</button>
                </div>
            `;
            document.getElementById('grid').appendChild(card);
            tCount = Object.keys(data).length;
            if(tCount >= 6) document.getElementById('addBtn').style.display = 'none';
        }

        function updateData(id, field, val) {
            data[id][field] = field === 'name' ? val : parseInt(val) || 0;
            save();
        }

        function upd(id, v) {
            data[id].score += v;
            document.getElementById(`score-${id}`).innerText = data[id].score;
            save();
        }

        function handleWarn(id) {
            data[id].warns++;
            document.getElementById(`w-${id}`).innerText = data[id].warns;
            if(data[id].warns > 1) {
                upd(id, -20);
                const card = document.getElementById(`card-${id}`);
                card.style.borderColor = '#f43f5e';
                setTimeout(() => card.style.borderColor = 'rgba(255,255,255,0.1)', 600);
            }
            save();
        }

        function calc() {
            let t = 0;
            Object.values(data).forEach(team => t += (parseInt(team.members) || 0));
            document.getElementById('totalMems').innerText = t;
        }

        function save() {
            localStorage.setItem('eclab_data', JSON.stringify(data));
        }

        function showResults() {
            const res = Object.values(data).sort((a,b) => b.score - a.score);
            const list = document.getElementById('rankList');
            list.innerHTML = '';
            const medals = ['🥇','🥈','🥉','🎖','🎖','🎖'];
            
            res.forEach((r, i) => {
                if(!r.name && r.score === 0) return;
                list.innerHTML += `<div class="rank-row"><span>${medals[i]} ${r.name || 'Без имени'}</span><b>${r.score}</b></div>`;
            });

            document.getElementById('modal').style.display = 'flex';
            
            // Массивный фейерверк
            const end = Date.now() + 4000;
            const colors = ['#4ade80', '#22d3ee', '#ffffff'];

            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
                confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function resetAll() {
            if(confirm("ВНИМАНИЕ: Все баллы и команды будут удалены безвозвратно. Продолжить?")) {
                localStorage.removeItem('eclab_data');
                location.reload();
            }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
