<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcLab 2.0 | Викторина</title>
    <style>
        :root {
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.5);
            --border: rgba(255, 255, 255, 0.1);
            --accent: linear-gradient(90deg, #4ade80, #22d3ee);
            --warn-yellow: #facc15;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg) radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 100%);
            color: #f8fafc;
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* Заголовок */
        .header { text-align: center; margin-bottom: 30px; }
        h1 {
            background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; margin: 0;
        }
        .sub { font-size: 1.2rem; color: #64748b; letter-spacing: 5px; text-transform: uppercase; }

        .stats {
            background: var(--card); padding: 12px 25px; border-radius: 100px;
            border: 1px solid var(--border); margin-bottom: 40px; font-size: 1rem;
        }

        /* Сетка 2 колонки */
        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 25px; width: 100%; max-width: 900px;
        }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--card); backdrop-filter: blur(20px);
            border-radius: 28px; padding: 25px; border: 1px solid var(--border);
            transition: 0.3s ease; position: relative;
        }

        .card-name {
            background: transparent; border: none; border-bottom: 2px solid var(--border);
            color: #fff; font-size: 1.5rem; font-weight: 800; width: 100%;
            margin-bottom: 15px; outline: none;
        }

        .card label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 5px; }

        .card-mems {
            background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            border-radius: 10px; color: #4ade80; padding: 8px; width: 100%; box-sizing: border-box;
            margin-bottom: 15px; font-weight: bold; outline: none;
        }

        .score {
            font-size: 4.5rem; font-weight: 900; text-align: center;
            background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn-pts-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .btn-p {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: #fff; padding: 12px 0; border-radius: 10px; cursor: pointer; font-weight: bold;
        }
        .btn-p:hover { background: #fff; color: #000; }

        .btn-warn {
            grid-column: span 5; margin-top: 15px; cursor: pointer;
            background: rgba(250, 204, 21, 0.05); border: 1px solid rgba(250, 204, 21, 0.2);
            color: var(--warn-yellow); padding: 14px; border-radius: 12px;
            font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* Кнопки управления */
        .controls { display: flex; gap: 15px; margin-top: 40px; }
        .btn-m {
            padding: 18px 35px; border-radius: 50px; border: none;
            font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-res { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(34, 211, 238, 0.3); }
        .btn-rst { background: transparent; color: #475569; border: 1px solid var(--border); }

        /* Модальное окно */
        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(10px);
        }
        .m-box {
            background: #0f172a; padding: 40px; border-radius: 35px; border: 1px solid var(--border);
            width: 90%; max-width: 400px; text-align: center;
        }
        .r-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid var(--border); font-size: 1.2rem; }

        /* АНИМАЦИЯ ФЕЙЕРВЕРКА */
        .particle {
            position: fixed; width: 6px; height: 6px; border-radius: 50%;
            pointer-events: none; z-index: 9999; animation: fly 1.5s ease-out forwards;
        }
        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>EcLab 2.0</h1>
        <div class="sub">Викторина</div>
    </div>

    <div class="stats">Количество участников (всего): <span id="total" style="color:#4ade80; font-weight:900">0</span></div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <button class="btn-m" style="background:#fff" onclick="add()">+ Команда</button>
        <button class="btn-m btn-res" onclick="finish()">Итоги</button>
        <button class="btn-m btn-rst" onclick="reset()">Сброс</button>
    </div>

    <div id="modal">
        <div class="m-box">
            <h2 style="font-size:2rem; margin-top:0">🏆 Рейтинг</h2>
            <div id="ranks"></div>
            <button onclick="closeM()" style="margin-top:25px; background:none; border:none; color:#444; cursor:pointer; font-weight:bold">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        let teams = JSON.parse(localStorage.getItem('eclab_final')) || {};

        window.onload = () => {
            const keys = Object.keys(teams);
            if(keys.length === 0) { add(); add(); } 
            else { keys.forEach(id => render(id)); calc(); }
        };

        function add() {
            if(Object.keys(teams).length >= 6) return;
            const id = 't' + Date.now();
            teams[id] = { name: '', mems: 0, score: 0, warns: 0 };
            render(id);
            save();
        }

        function render(id) {
            const t = teams[id];
            const div = document.createElement('div');
            div.className = 'card';
            div.id = id;
            div.innerHTML = `
                <input type="text" class="card-name" placeholder="Команда..." value="${t.name}" oninput="updData('${id}','name',this.value)">
                <label>Количество участников</label>
                <input type="number" class="card-mems" value="${t.mems}" oninput="updData('${id}','mems',this.value); calc()">
                <div class="score" id="s-${id}">${t.score}</div>
                <div class="btn-pts-grid">
                    ${[10,20,30,40,50].map(p => `<button class="btn-p" onclick="updScore('${id}',${p})">${p}</button>`).join('')}
                    <button class="btn-warn" onclick="warn('${id}')">⚠️ Предупреждение (<span id="w-${id}">${t.warns}</span>)</button>
                </div>
            `;
            document.getElementById('grid').appendChild(div);
        }

        function updData(id, f, v) { teams[id][f] = v; save(); }

        function updScore(id, v) {
            teams[id].score += v;
            document.getElementById(`s-${id}`).innerText = teams[id].score;
            save();
        }

        function warn(id) {
            teams[id].warns++;
            document.getElementById(`w-${id}`).innerText = teams[id].warns;
            if(teams[id].warns > 1) {
                updScore(id, -20);
                const c = document.getElementById(id);
                c.style.borderColor = 'red';
                setTimeout(() => c.style.borderColor = 'rgba(255,255,255,0.1)', 500);
            }
            save();
        }

        function calc() {
            let sum = 0;
            Object.values(teams).forEach(t => sum += (parseInt(t.mems) || 0));
            document.getElementById('total').innerText = sum;
        }

        function save() { localStorage.setItem('eclab_final', JSON.stringify(teams)); }

        function finish() {
            const res = Object.values(teams).sort((a,b) => b.score - a.score);
            const list = document.getElementById('ranks');
            list.innerHTML = '';
            const medals = ['🥇','🥈','🥉','🎖','🎖','🎖'];
            res.forEach((r, i) => {
                list.innerHTML += `<div class="r-row"><span>${medals[i]} ${r.name || '...'}</span><b>${r.score}</b></div>`;
            });
            document.getElementById('modal').style.display = 'flex';
            boom(); // Запуск фейерверка
        }

        // ГАРАНТИРОВАННЫЙ ФЕЙЕРВЕРК
        function boom() {
            const colors = ['#4ade80', '#22d3ee', '#facc15', '#ff4d4d', '#ffffff'];
            for (let i = 0; i < 150; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = '50%';
                p.style.top = '50%';
                // Случайное направление разлета
                const x = (Math.random() - 0.5) * window.innerWidth;
                const y = (Math.random() - 0.5) * window.innerHeight;
                p.style.setProperty('--x', `${x}px`);
                p.style.setProperty('--y', `${y}px`);
                document.body.appendChild(p);
                // Удаляем частицу после анимации
                setTimeout(() => p.remove(), 1500);
            }
        }

        function reset() {
            if(confirm("Сбросить всё?")) { localStorage.removeItem('eclab_final'); location.reload(); }
        }

        function closeM() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
