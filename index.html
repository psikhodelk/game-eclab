<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пульт: Своя Игра</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid #3498db; }
        .team-name { font-size: 1.1em; font-weight: bold; width: 90%; border: none; border-bottom: 2px dashed #ccc; text-align: center; margin-bottom: 10px; outline: none; }
        .score { font-size: 3rem; font-weight: bold; margin: 10px 0; color: #2c3e50; }
        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        button { border: none; border-radius: 5px; padding: 10px; font-weight: bold; cursor: pointer; }
        .btn-add { background: #2ecc71; color: white; }
        .btn-sub { background: #e74c3c; color: white; grid-column: span 3; }
        .controls { margin-top: 30px; display: flex; gap: 10px; justify-content: center; }
        .btn-result { background: #f1c40f; color: #2c3e50; padding: 15px 30px; font-size: 1.2em; }
        .btn-reset { background: #95a5a6; color: white; padding: 15px 20px; }
        /* Стиль для окна итогов */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; box-shadow: 0 0 100px rgba(0,0,0,0.5); border-radius: 15px; z-index: 10; width: 80%; max-width: 400px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 5; }
    </style>
</head>
<body>

    <h1>Экономическая «Своя игра»</h1>

    <div class="grid" id="game-grid"></div>

    <div class="controls">
        <button class="btn-result" onclick="showResults()">🏆 ПОДВЕСТИ ИТОГИ</button>
        <button class="btn-reset" onclick="resetAll()">Сброс</button>
    </div>

    <!-- Окно с итогами -->
    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal">
        <h2>Итоговая таблица</h2>
        <div id="result-list" style="text-align: left; font-size: 1.2em; line-height: 2;"></div>
        <button style="margin-top: 20px; width: 100%;" onclick="closeModal()">Закрыть</button>
    </div>

    <script>
        const teamsCount = 6;
        const points = [10, 20, 30, 40, 50];
        const grid = document.getElementById('game-grid');

        for (let i = 1; i <= teamsCount; i++) {
            grid.innerHTML += `
                <div class="card">
                    <input type="text" class="team-name" id="name${i}" value="Команда ${i}">
                    <div id="score${i}" class="score">0</div>
                    <div class="btn-group">
                        ${points.map(p => `<button class="btn-add" onclick="change(${i}, ${p})">+${p}</button>`).join('')}
                        <button class="btn-sub" onclick="change(${i}, -20)">Штраф (-20)</button>
                    </div>
                </div>
            `;
        }

        function change(id, val) {
            let el = document.getElementById('score' + id);
            el.innerText = parseInt(el.innerText) + val;
        }

        function showResults() {
            let data = [];
            for (let i = 1; i <= teamsCount; i++) {
                data.push({
                    name: document.getElementById('name' + i).value,
                    score: parseInt(document.getElementById('score' + i).innerText)
                });
            }

            // Сортировка: от большего к меньшему
            data.sort((a, b) => b.score - a.score);

            let html = "";
            data.forEach((team, index) => {
                let icon = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : "🔹";
                html += `<div>${icon} ${team.name}: <b>${team.score}</b></div>`;
            });

            document.getElementById('result-list').innerHTML = html;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function resetAll() {
            if(confirm("Сбросить все баллы?")) {
                for (let i = 1; i <= teamsCount; i++) document.getElementById('score' + i).innerText = 0;
            }
        }
    </script>
</body>
</html>
