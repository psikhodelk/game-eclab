<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EcLab 2.0 | Викторина</title>
    <!-- Подключаем библиотеку фейерверка -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        /* ПРИНУДИТЕЛЬНЫЕ ЦВЕТА БЕЗ ПРОЗРАЧНОСТИ */
        body {
            background-color: #000000 !important;
            color: #ffffff !important;
            font-family: 'Arial Black', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-logo {
            font-size: 60px; color: #4ade80; margin: 20px 0;
            text-shadow: 4px 4px #000, 0 0 20px #38bdf8;
        }

        .grid {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 20px; width: 100%; max-width: 1200px;
        }

        /* КАРТОЧКИ: ТЕПЕРЬ ЯРКИЕ И НЕПРОЗРАЧНЫЕ */
        .team-card {
            background: #1e293b !important; /* Глубокий синий */
            border: 5px solid #38bdf8 !important; /* Яркая голубая рамка */
            border-radius: 20px;
            width: 450px; padding: 25px;
            box-sizing: border-box; text-align: center;
            box-shadow: 10px 10px 0px #000;
        }

        .team-name {
            font-size: 24px; font-weight: 900; width: 90%;
            background: #000; color: #fff; border: 2px solid #4ade80;
            padding: 10px; border-radius: 10px; text-align: center;
        }

        .score {
            font-size: 120px; font-weight: 900; color: #38bdf8;
            margin: 10px 0; line-height: 1;
        }

        .controls { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }

        .btn-add {
            background: #334155; color: #fff; border: 1px solid #fff;
            padding: 15px 0; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .btn-add:hover { background: #4ade80; color: #000; }

        /* ЖЕЛТАЯ КНОПКА ПРЕДУПРЕЖДЕНИЯ */
        .btn-warn {
            grid-column: span 5; margin-top: 15px;
            background: #facc15 !important; color: #000 !important;
            border: none; padding: 15px; border-radius: 10px;
            font-weight: 900; cursor: pointer; font-size: 16px;
        }

        .btn-finish {
            background: #4ade80; color: #000; padding: 25px 60px;
            border-radius: 50px; font-weight: 900; font-size: 30px;
            border: 4px solid #fff; cursor: pointer; margin: 40px 0;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.6);
        }

        /* ОКНО ИТОГОВ */
        #modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.95); z-index: 10000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #1e293b; padding: 50px; border-radius: 30px;
            border: 5px solid #4ade80; width: 500px; text-align: center;
        }
        .res-row {
            display: flex; justify-content: space-between;
            padding: 15px; border-bottom: 2px solid #334151; font-size: 32px;
        }
    </style>
</head>
<body>

    <div class="header-logo">EcLab 2.0</div>
    
    <div class="grid" id="main-grid">
        <!-- Скрипт вставит карточки сюда -->
    </div>

    <button class="btn-finish" onclick="startFinal()">ПОДВЕСТИ ИТОГИ</button>

    <div id="modal">
        <div class="modal-content">
            <h1 style="color:#4ade80; font-size: 45px; margin-top:0;">ЧЕМПИОНЫ</h1>
            <div id="res-list"></div>
            <button class="btn-finish" style="font-size:20px; padding:15px;" onclick="document.getElementById('modal').style.display='none'">ВЕРНУТЬСЯ</button>
        </div>
    </div>

    <script>
        const points =;
        
        let game = JSON.parse(localStorage.getItem('eclab_v5')) || {
            teams: ["КОМАНДА 1", "КОМАНДА 2", "КОМАНДА 3", "КОМАНДА 4", "КОМАНДА 5", "КОМАНДА 6"],
            scores:,
            warns:,
            members:
        };

        function draw() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            game.teams.forEach((name, i) => {
                grid.innerHTML += `
                    <div class="team-card">
                        <input class="team-name" value="${name}" onchange="upd('teams', ${i}, this.value)">
                        <div style="margin: 10px 0; color: #94a3b8;">
                            УЧАСТНИКОВ: <input type="number" value="${game.members[i]}" 
                            style="width:50px; background:#000; color:#4ade80; border:1px solid #38bdf8; text-align:center;" 
                            onchange="upd('members', ${i}, this.value)">
                        </div>
                        <div class="score" id="score-${i}">${game.scores[i]}</div>
                        <div class="controls">
                            ${points.map(p => `<button class="btn-add" onclick="add(${i}, ${p})">+${p}</button>`).join('')}
                            <button class="btn-warn" onclick="warning(${i})">
                                ⚠️ ПРЕДУПРЕЖДЕНИЕ (${game.warns[i]})
                            </button>
                        </div>
                    </div>
                `;
            });
            localStorage.setItem('eclab_v5', JSON.stringify(game));
        }

        function upd(key, i, val) { 
            game[key][i] = (key === 'teams') ? val.toUpperCase() : parseInt(val || 0); 
            draw(); 
        }

        function add(i, p) { 
            game.scores[i] += p; 
            draw(); 
        }

        function warning(i) {
            game.warns[i]++;
            if(game.warns[i] >= 2) game.scores[i] -= 20;
            draw();
        }

        // ГЛАВНАЯ ФУНКЦИЯ ФИНАЛА
        function startFinal() {
            // 1. ЗАПУСКАЕМ ФЕЙЕРВЕРК
            const duration = 5 * 1000;
            const animationEnd = Date.now() + duration;

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                confetti({
                    particleCount: 40,
                    startVelocity: 30,
                    spread: 360,
                    origin: { x: Math.random(), y: Math.random() - 0.2 },
                    colors: ['#4ade80', '#38bdf8', '#facc15', '#ffffff']
                });
            }, 200);

            // 2. ПОДГОТАВЛИВАЕМ СПИСОК
            const list = document.getElementById('res-list');
            const sorted = game.teams.map((name, i) => ({ name, score: game.scores[i] }))
                                     .sort((a, b) => b.score - a.score);
            
            list.innerHTML = sorted.map((t, i) => {
                let icon = i === 0 ? '🥇' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : '•'));
                return `<div class="res-row"><span>${icon} ${t.name}</span> <b>${t.score}</b></div>`;
            }).join('');
            
            // 3. ПОКАЗЫВАЕМ ОКНО ЧЕРЕЗ 2 СЕКУНДЫ (после начала фейерверка)
            setTimeout(() => {
                document.getElementById('modal').style.display = 'flex';
            }, 2500);
        }

        // Запуск при старте
        draw();
    </script>
</body>
</html>
