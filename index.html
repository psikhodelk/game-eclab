<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EcLab 2.0 | Викторина</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root {
            --primary: #38bdf8;
            --accent: #4ade80;
            --warning: #facc15;
            --bg: #020617;
            /* Плотный градиент для карточек */
            --card-grad: linear-gradient(145deg, #1e293b, #0f172a);
        }

        body {
            background-color: var(--bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 40px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-logo {
            font-size: 72px; font-weight: 900;
            background: linear-gradient(90deg, var(--accent), var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.3));
        }

        .stats-bar {
            background: #1e293b; border: 2px solid var(--primary);
            padding: 10px 30px; border-radius: 50px; margin-bottom: 40px;
            font-weight: bold; box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 30px; width: 100%; max-width: 1100px;
        }

        .team-card {
            background: var(--card-grad) !important; /* Плотный фон */
            border: 2px solid #334155 !important;
            border-radius: 30px; padding: 30px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        .team-card:hover { 
            transform: translateY(-8px); 
            border-color: var(--primary) !important;
            box-shadow: 0 15px 40px rgba(56, 189, 248, 0.2);
        }

        .team-name {
            font-size: 26px; font-weight: 800; background: #0f172a;
            color: #ffffff; border: 2px solid #334155;
            width: 100%; text-align: center; padding: 12px; margin-bottom: 20px;
            border-radius: 15px; outline: none;
        }

        .score {
            font-size: 100px; font-weight: 900; color: var(--primary);
            margin: 15px 0; line-height: 1;
            text-shadow: 2px 2px 0px #000;
        }

        .controls { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }

        .btn-add {
            background: #334155; color: white; border: none;
            padding: 15px 0; border-radius: 12px; font-weight: bold; cursor: pointer;
            font-size: 16px; transition: 0.2s;
        }
        .btn-add:hover { background: var(--accent); color: #000; transform: scale(1.1); }

        .btn-warn {
            grid-column: span 5; margin-top: 20px;
            background: rgba(250, 204, 21, 0.1); color: var(--warning); 
            border: 2px solid var(--warning);
            padding: 14px; border-radius: 15px; cursor: pointer;
            font-weight: 800; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-warn:hover { background: var(--warning); color: #000; }

        .btn-finish {
            background: linear-gradient(90deg, var(--accent), var(--primary));
            color: #000; padding: 25px 70px; border-radius: 20px;
            font-weight: 900; font-size: 32px; border: none; cursor: pointer; 
            margin-top: 60px; box-shadow: 0 10px 30px rgba(74, 222, 128, 0.4);
        }
        .btn-finish:hover { transform: scale(1.05); }

        #modal {
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.95); z-index: 9999;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #1e293b; padding: 50px; border-radius: 40px;
            width: 500px; border: 3px solid var(--primary); text-align: center;
        }
        .res-row { 
            display: flex; justify-content: space-between; 
            padding: 20px; border-bottom: 1px solid #334151; font-size: 28px;
        }
    </style>
</head>
<body>

    <div class="header-logo">EcLab 2.0</div>
    <div class="stats-bar">👥 ВСЕГО УЧАСТНИКОВ: <span id="total-val">0</span></div>
    
    <div class="grid" id="main-grid"></div>

    <button class="btn-finish" onclick="finish()">ЗАВЕРШИТЬ ИГРУ</button>
    
    <div style="margin-top:30px; color:#475569; cursor:pointer; font-size:14px;" onclick="clearAll()">
        Сбросить всё (очистка памяти)
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 style="color:var(--accent); font-size: 42px; margin-top:0;">Результаты</h2>
            <div id="res-list"></div>
            <button class="btn-finish" style="font-size:20px; padding:15px 30px; margin-top:30px;" onclick="document.getElementById('modal').style.display='none'">Закрыть</button>
        </div>
    </div>

    <script>
        const points =;
        
        let game = JSON.parse(localStorage.getItem('eclab_v3')) || {
            teams: ["Команда 1", "Команда 2", "Команда 3", "Команда 4", "Команда 5", "Команда 6"],
            scores:,
            warns:,
            members:
        };

        function draw() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            let total = 0;
            
            game.teams.forEach((name, i) => {
                total += parseInt(game.members[i] || 0);
                grid.innerHTML += `
                    <div class="team-card">
                        <input class="team-name" value="${name}" onchange="upd('teams', ${i}, this.value)">
                        <div style="font-size:16px; color:#94a3b8; margin-bottom:15px; font-weight:600;">
                            Участников: <input type="number" value="${game.members[i]}" 
                            style="width:60px; background:#000; color:var(--accent); border:1px solid var(--primary); border-radius:8px; text-align:center; padding:5px;" 
                            onchange="upd('members', ${i}, this.value)">
                        </div>
                        <div class="score">${game.scores[i]}</div>
                        <div class="controls">
                            ${points.map(p => `<button class="btn-add" onclick="add(${i}, ${p})">+${p}</button>`).join('')}
                            <button class="btn-warn" onclick="warning(${i})">
                                ⚠️ ПРЕДУПРЕЖДЕНИЕ (${game.warns[i]})
                            </button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-val').innerText = total;
            localStorage.setItem('eclab_v3', JSON.stringify(game));
        }

        function upd(key, i, val) { 
            game[key][i] = (key === 'teams') ? val : parseInt(val || 0); 
            draw(); 
        }

        function add(i, p) { game.scores[i] += p; draw(); }

        function warning(i) {
            game.warns[i]++;
            if(game.warns[i] >= 2) game.scores[i] -= 20;
            draw();
        }

        function finish() {
            // Эпичный затяжной фейерверк
            var end = Date.now() + (3 * 1000);
            var colors = ['#4ade80', '#38bdf8', '#facc15'];

            (function frame() {
              confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: colors
              });
              confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: colors
              });

              if (Date.now() < end) {
                requestAnimationFrame(frame);
              }
            }());

            const list = document.getElementById('res-list');
            const sorted = game.teams.map((name, i) => ({ name, score: game.scores[i] }))
                                     .sort((a, b) => b.score - a.score);
            
            list.innerHTML = sorted.map((t, i) => {
                let m = i === 0 ? '🥇' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : '•'));
                return `<div class="res-row"><span>${m} ${t.name}</span> <b>${t.score}</b></div>`;
            }).join('');
            
            setTimeout(() => {
                document.getElementById('modal').style.display = 'flex';
            }, 500);
        }

        function clearAll() { if(confirm("Очистить все баллы?")) { localStorage.clear(); location.reload(); } }
        
        draw();
    </script>
</body>
</html>
