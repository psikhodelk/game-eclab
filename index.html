<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcLab 2.0 | Game Board</title>
    <style>
        :root {
            --bg: #020617;
            --panel: #1e293b;
            --accent: #22d3ee;
            --gold: #facc15;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; touch-action: none;
        }

        h1 { background: linear-gradient(90deg, #4ade80, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }

        /* Панель команд (Фишки) */
        .teams-dock {
            display: flex; gap: 15px; margin: 20px 0; padding: 20px;
            background: var(--glass); border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap; justify-content: center;
        }

        .team-chip {
            background: var(--accent); color: #000;
            padding: 10px 20px; border-radius: 30px;
            cursor: grab; font-weight: 800; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 5px 15px rgba(34, 211, 238, 0.3);
            user-select: none; transition: transform 0.2s;
        }
        .team-chip:active { cursor: grabbing; transform: scale(1.1); }
        
        .score-val { background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 10px; font-size: 0.9rem; }
        .warn-btn { background: #000; color: var(--gold); border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; cursor: pointer; }

        /* Игровое поле */
        .game-board {
            display: grid; grid-template-columns: 200px repeat(5, 1fr);
            gap: 15px; width: 100%; max-width: 1100px; margin-top: 20px;
        }

        .category-name {
            background: rgba(255,255,255,0.02); display: flex; align-items: center;
            padding-left: 20px; font-weight: 700; color: #94a3b8; text-transform: uppercase;
            border-radius: 15px; border-left: 4px solid var(--accent);
        }

        .cell {
            background: var(--panel); aspect-ratio: 16/9;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 900; color: var(--gold);
            border-radius: 15px; border: 2px solid transparent;
            transition: 0.3s; position: relative;
        }
        .cell.over { border-color: var(--accent); background: rgba(34, 211, 238, 0.1); }
        .cell.used { opacity: 0.2; pointer-events: none; grayscale: 1; }

        /* Управление */
        .controls { margin-top: 40px; display: flex; gap: 20px; }
        .btn { padding: 15px 40px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-res { background: var(--accent); color: #000; }
        .btn-reset { background: transparent; color: #475569; border: 1px solid rgba(255,255,255,0.1); }

        /* Конфети */
        .dot { position: fixed; width: 8px; height: 8px; border-radius: 50%; pointer-events: none; animation: fall 1.5s forwards; }
        @keyframes fall { 0% { transform: translate(0,0); opacity:1; } 100% { transform: translate(var(--x), var(--y)); opacity:0; } }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .m-box { background: #0f172a; padding: 40px; border-radius: 30px; text-align: center; width: 350px; }
    </style>
</head>
<body>

    <h1>EcLab 2.0</h1>
    <div style="color: #64748b; margin-bottom: 10px;">Перетащите команду на баллы</div>

    <div class="teams-dock" id="dock">
        <!-- Команды появятся здесь -->
    </div>

    <div class="game-board" id="board">
        <!-- Категории и ячейки -->
    </div>

    <div class="controls">
        <button class="btn" style="background:#fff" onclick="addTeamPrompt()">+ Команда</button>
        <button class="btn btn-res" onclick="showWinners()">ИТОГИ</button>
        <button class="btn btn-reset" onclick="resetGame()">СБРОС</button>
    </div>

    <div id="modal">
        <div class="m-box">
            <h2>🏆 Победители</h2>
            <div id="ranks"></div>
            <button onclick="document.getElementById('modal').style.display='none'" style="margin-top:20px; background:none; border:none; color:#555; cursor:pointer">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        let teams = JSON.parse(localStorage.getItem('eclab_board')) || {};
        const categories = ['История', 'География', 'Культура', 'Обо всем'];
        const values = [10, 20, 30, 40, 50];

        function init() {
            // Рисуем поле
            const board = document.getElementById('board');
            categories.forEach(cat => {
                const label = document.createElement('div');
                label.className = 'category-name';
                label.innerText = cat;
                board.appendChild(label);

                values.forEach(val => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = val;
                    cell.dataset.value = val;
                    cell.ondragover = e => { e.preventDefault(); cell.classList.add('over'); };
                    cell.ondragleave = () => cell.classList.remove('over');
                    cell.ondrop = e => handleDrop(e, cell);
                    board.appendChild(cell);
                });
            });

            // Рисуем команды
            if (Object.keys(teams).length === 0) {
                ["Команда 1", "Команда 2"].forEach(n => createTeam(n));
            } else {
                Object.keys(teams).forEach(id => renderTeam(id));
            }
        }

        function createTeam(name) {
            const id = 't' + Date.now() + Math.random();
            teams[id] = { name, score: 0, warns: 0 };
            renderTeam(id);
            save();
        }

        function renderTeam(id) {
            const t = teams[id];
            const chip = document.createElement('div');
            chip.className = 'team-chip';
            chip.id = id;
            chip.draggable = true;
            chip.innerHTML = `
                <span>${t.name}</span>
                <span class="score-val" id="s-${id}">${t.score}</span>
                <button class="warn-btn" onclick="addWarn(event, '${id}')">⚠️</button>
            `;
            chip.ondragstart = e => e.dataTransfer.setData('text', id);
            document.getElementById('dock').appendChild(chip);
        }

        function handleDrop(e, cell) {
            e.preventDefault();
            cell.classList.remove('over');
            const teamId = e.dataTransfer.getData('text');
            const points = parseInt(cell.dataset.value);

            teams[teamId].score += points;
            document.getElementById(`s-${teamId}`).innerText = teams[teamId].score;
            cell.classList.add('used');
            
            save();
            // Маленький эффект при попадании
            cell.style.background = '#4ade80';
            setTimeout(() => cell.style.background = '', 300);
        }

        function addWarn(e, id) {
            e.stopPropagation();
            teams[id].warns++;
            if(teams[id].warns > 1) {
                teams[id].score -= 20;
                document.getElementById(`s-${id}`).innerText = teams[id].score;
                alert(`Штраф -20 для ${teams[id].name}`);
            } else {
                alert(`Предупреждение для ${teams[id].name}`);
            }
            save();
        }

        function addTeamPrompt() {
            const n = prompt("Введите название команды:");
            if(n) createTeam(n);
        }

        function showWinners() {
            const res = Object.values(teams).sort((a,b) => b.score - a.score);
            const list = document.getElementById('ranks');
            list.innerHTML = '';
            res.forEach((r, i) => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222">
                    <span>${i+1}. ${r.name}</span><b>${r.score}</b>
                </div>`;
            });
            document.getElementById('modal').style.display = 'flex';
            boom();
        }

        function boom() {
            for(let i=0; i<100; i++) {
                const d = document.createElement('div');
                d.className = 'dot';
                d.style.left = '50%'; d.style.top = '50%';
                d.style.background = ['#4ade80', '#22d3ee', '#facc15'][i%3];
                d.style.setProperty('--x', (Math.random()-0.5)*800+'px');
                d.style.setProperty('--y', (Math.random()-0.5)*800+'px');
                document.body.appendChild(d);
                setTimeout(() => d.remove(), 1500);
            }
        }

        function resetGame() { if(confirm("Сбросить игру?")) { localStorage.removeItem('eclab_board'); location.reload(); } }
        function save() { localStorage.setItem('eclab_board', JSON.stringify(teams)); }

        init();
    </script>
</body>
</html>
