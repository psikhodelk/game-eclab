<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EcLab 2.0 | Викторина</title>
    <!-- Библиотека для фейерверка -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root {
            --primary: #38bdf8;
            --accent: #4ade80;
            --warning: #facc15;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            background-color: var(--bg) !important;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 40px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .header-logo {
            font-size: 72px; font-weight: 900; letter-spacing: -2px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(0 10px 15px rgba(56, 189, 248, 0.2));
        }

        .stats-bar {
            background: rgba(56, 189, 248, 0.1); border: 1px solid var(--primary);
            padding: 8px 25px; border-radius: 100px; margin-bottom: 40px;
            backdrop-filter: blur(10px); font-weight: 600;
        }

        .grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 25px; width: 100%; max-width: 1100px;
        }

        .team-card {
            background: var(--card-bg) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 24px; padding: 25px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            transition: transform 0.3s ease;
        }
        .team-card:hover { transform: translateY(-5px); border-color: var(--primary) !important; }

        .team-name {
            font-size: 24px; font-weight: 800; background: rgba(0,0,0,0.3);
            color: #fff; border: 1px solid rgba(255,255,255,0.1);
            width: 100%; text-align: center; padding: 10px; margin-bottom: 15px;
            border-radius: 12px; outline: none;
        }

        .score {
            font-size: 90px; font-weight: 900; color: var(--primary);
            margin: 10px 0; text-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
        }

        .controls { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }

        .btn-add {
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 0; border-radius: 12px; font-weight: bold; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-add:hover { background: var(--accent); color: #000; transform: scale(1.05); }

        .btn-warn {
            grid-column: span 5; margin-top: 15px;
            background: rgba(250, 204, 21, 0.1); color: var(--warning); 
            border: 1px solid var(--warning);
            padding: 12px; border-radius: 12px; cursor: pointer;
            font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s;
        }
        .btn-warn:hover { background: var(--warning); color: #000; }

        .btn-finish {
            background: linear-gradient(135deg, var(--accent), var(--primary));
            color: #000; padding: 22px 60px; border-radius: 20px;
            font-weight: 900; font-size: 28px; border: none; cursor: pointer; 
            margin-top: 50px; box-shadow: 0 10px 25px rgba(74, 222, 128, 0.3);
            transition: all 0.3s;
        }
        .btn-finish:hover { transform: scale(1.05); box-shadow: 0 15px 35px rgba(74, 222, 128, 0.5); }

        #modal {
            display: none; position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.9); z-index: 9999;
            justify-content: center; align-items: center; backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #1e293b; padding: 40px; border-radius: 32px;
            width: 450px; border: 2px solid var(--primary); text-align: center;
        }
        .res-row { 
            display: flex; justify-content: space-between; 
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="header-logo">EcLab 2.0</div>
    <div class="stats-bar">👥 Общее число участников: <span id="total-val">0</span></div>
    
    <div class="grid" id="main-grid"></div>

    <button class="btn-finish" onclick="finish()">ФИНАЛ И ИТОГИ</button>
    
    <div style="margin-top:30px; color:#475569; cursor:pointer; font-size:14px; text-decoration: underline;" onclick="clearAll()">
        Очистить данные турнира
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 style="color:var(--accent); font-size: 36px; margin-bottom: 25px;">🏆 Победители</h2>
            <div id="res-list"></div>
            <button class="btn-finish" style="font-size:18px; padding:15px 30px; margin-top: 25px;" onclick="document.getElementById('modal').style.display='none'">Вернуться</button>
        </div>
    </div>

    <script>
        const points =;
        
        let game = JSON.parse(localStorage.getItem('eclab_v2_data')) || {
            teams: ["Альфа", "Бета", "Гамма", "Дельта", "Эпсилон", "Омега"],
            scores: [0,0,0,0,0,0],
            warns: [0,0,0,0,0,0],
            members: [0,0,0,0,0,0]
        };

        function draw() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            let total = 0;
            
            game.teams.forEach((name, i) => {
                total += parseInt(game.members[i] || 0);
                grid.innerHTML += `
                    <div class="team-card">
                        <input class="team-name" value="${name}" onchange="upd('teams', ${i}, this.value)">
                        <div style="font-size:14px; color:#94a3b8; margin-bottom:12px;">
                            Участников: <input type="number" value="${game.members[i]}" 
                            style="width:55px; background:rgba(0,0,0,0.5); color:var(--accent); border:1px solid var(--primary); border-radius:6px; text-align:center;" 
                            onchange="upd('members', ${i}, this.value)">
                        </div>
                        <div class="score">${game.scores[i]}</div>
                        <div class="controls">
                            ${points.map(p => `<button class="btn-add" onclick="add(${i}, ${p})">+${p}</button>`).join('')}
                            <button class="btn-warn" onclick="warning(${i})">
                                ⚠️ Предупреждение (${game.warns[i]})
                            </button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-val').innerText = total;
            localStorage.setItem('eclab_v2_data', JSON.stringify(game));
        }

        function upd(key, i, val) { 
            game[key][i] = (key === 'teams') ? val : parseInt(val || 0); 
            draw(); 
        }

        function add(i, p) { game.scores[i] += p; draw(); }

        function warning(i) {
            game.warns[i]++;
            if(game.warns[i] >= 2) game.scores[i] -= 20;
            draw();
        }

        function finish() {
            // Запуск мощного фейерверка
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
              confetti({
                particleCount: 5,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#38bdf8', '#4ade80']
              });
              confetti({
                particleCount: 5,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#38bdf8', '#4ade80']
              });

              if (Date.now() < end) {
                requestAnimationFrame(frame);
              }
            }());

            const list = document.getElementById('res-list');
            const sorted = game.teams.map((name, i) => ({ name, score: game.scores[i] }))
                                     .sort((a, b) => b.score - a.score);
            
            list.innerHTML = sorted.map((t, i) => {
                let m = i === 0 ? '🥇' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : '•'));
                return `<div class="res-row"><span>${m} ${t.name}</span> <b>${t.score}</b></div>`;
            }).join('');
            
            setTimeout(() => {
                document.getElementById('modal').style.display = 'flex';
            }, 500);
        }

        function clearAll() { if(confirm("Внимание! Все баллы будут обнулены. Продолжить?")) { localStorage.clear(); location.reload(); } }
        
        draw();
    </script>
</body>
</html>
