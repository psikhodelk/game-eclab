<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Планшет Игрока — Бизнес-Выживалити</title>
    <style>
        :root {
            --bg-page: #f9f9f9;
            --board-bg: #ffffff;
            --brand-yellow: #ffd200; 
            --brand-black: #0d0d0d;  
            --border-thick: 4px solid #0d0d0d; 
        }
        
        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Планшет А5 в стиле комикса */
        .player-board {
            width: 800px;
            height: 530px;
            background-color: var(--board-bg);
            border: var(--border-thick);
            border-radius: 0px; 
            padding: 35px;
            box-sizing: border-box;
            box-shadow: 12px 12px 0px var(--brand-black); 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            background-image: radial-gradient(#0d0d0d 1px, transparent 1px);
            background-size: 16px 16px;
            overflow: hidden;
        }

        /* Декоративная косая черно-желтая деталь на фоне */
        .player-board::after {
            content: '';
            position: absolute;
            top: -50px;
            right: -80px;
            width: 150px;
            height: 300px;
            background: var(--brand-yellow);
            transform: rotate(35deg);
            z-index: 1;
            border-left: var(--border-thick);
            opacity: 0.8;
        }

        /* Рамка для карточки Сектора */
        .sector-zone {
            border: var(--border-thick);
            background-color: var(--brand-yellow);
            height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 6px 6px 0px var(--brand-black);
            z-index: 2;
            position: relative;
        }

        .sector-zone span {
            color: var(--brand-black);
            font-size: 22px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Контейнер для шкал ресурсов */
        .tracks-container {
            display: flex;
            flex-direction: column;
            gap: 22px;
            margin-top: 15px;
            z-index: 2;
        }

        /* Строка параметра */
        .track-row {
            display: flex;
            align-items: center;
            background: #ffffff;
            padding: 12px 20px;
            border: var(--border-thick);
            box-shadow: 6px 6px 0px var(--brand-black);
            position: relative;
        }

        /* Название параметра без сокращений (ширина увеличена до 170px) */
        .track-label {
            width: 170px;
            color: var(--brand-black);
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Сетка кружочков */
        .track-values {
            display: flex;
            justify-content: space-between;
            flex-grow: 1;
            padding-left: 15px;
        }

        /* Кружочки для фишек */
        .value-circle {
            width: 38px;
            height: 38px;
            border: 3px solid var(--brand-black);
            background-color: #ffffff;
            color: var(--brand-black);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 900;
            font-family: Arial, sans-serif;
            transition: background 0.2s;
        }

        .row-capital .value-circle:hover { background-color: #2ecc71; color: white; }
        .row-reputation .value-circle:hover { background-color: #3498db; color: white; }
        .row-power .value-circle:hover { background-color: #e67e22; color: white; }

        /* Последняя цифра «10» */
        .value-circle:last-child {
            background-color: var(--brand-yellow);
        }
    </style>
</head>
<body>

    <div class="player-board">
        <!-- Место для карточки сектора -->
        <div class="sector-zone">
            <span>💥 [ МЕСТО ДЛЯ КАРТОЧКИ СЕКТОРА ] 💥</span>
        </div>

        <!-- Три шкалы ресурсов -->
        <div class="tracks-container">
            
            <!-- КАПИТАЛ -->
            <div class="track-row row-capital">
                <div class="track-label">💵 КАПИТАЛ</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

            <!-- РЕПУТАЦИЯ -->
            <div class="track-row row-reputation">
                <div class="track-label">⭐ РЕПУТАЦИЯ</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

            <!-- МОЩНОСТЬ -->
            <div class="track-row row-power">
                <div class="track-label">⚡ МОЩНОСТЬ</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
