<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Своя Игра: Экономика (Dark Mode)</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
        }

        h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
            width: 100%; 
            max-width: 1200px; 
        }

        .team-card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); 
            text-align: center; 
            border: 1px solid #334155;
            transition: transform 0.2s;
        }

        .team-name { 
            font-size: 1.5em; 
            font-weight: 700; 
            background: transparent;
            color: var(--text);
            border: none; 
            text-align: center; 
            width: 100%; 
            margin-bottom: 10px;
            border-bottom: 2px solid transparent;
        }

        .team-name:focus { 
            outline: none; 
            border-bottom-color: var(--accent);
            background: #334155;
        }

        .score { 
            font-size: 4em; 
            font-weight: 900; 
            color: var(--accent); 
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .controls { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }

        button { 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            padding: 12px 0; 
            font-weight: bold; 
            transition: all 0.2s; 
            color: white;
        }

        .btn-plus { background: #0f172a; border: 1px solid var(--success); color: var(--success); }
        .btn-plus:hover { background: var(--success); color: white; }

        .btn-warning { 
            background: rgba(245, 158, 11, 0.1); 
            border: 1px solid var(--warning);
            color: var(--warning);
            grid-column: span 5; 
            margin-top: 15px; 
        }
        .btn-warning:hover { background: var(--warning); color: #000; }

        .warning-count { font-size: 0.85em; color: #94a3b8; margin-top: 10px; }

        .footer-btns { margin-top: 50px; display: flex; gap: 20px; }
        .btn-main { padding: 15px 40px; font-size: 1.1em; border-radius: 12px; }
        .btn-results { background: var(--accent); color: #0f172a; }
        .btn-reset { background: transparent; border: 1px solid #475569; color: #94a3b8; }
        .btn-reset:hover { border-color: var(--danger); color: var(--danger); }
        
        #modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
            justify-content: center; align-items: center; z-index: 100; 
        }
        .modal-content { 
            background: var(--card-bg); padding: 50px; border-radius: 24px; 
            text-align: center; border: 1px solid var(--accent);
        }
        .winner-item { font-size: 1.6em; margin: 15px 0; color: #cbd5e1; }
        .first { color: var(--warning); font-size: 2.5em; font-weight: 900; }
    </style>
</head>
<body>

    <h1>🏆 Экономическая игра</h1>
    
    <div class="grid" id="scoreboard"></div>

    <div class="footer-btns">
        <button class="btn-main btn-results" onclick="showResults()">Подвести итоги</button>
        <button class="btn-main btn-reset" onclick="resetScores()">Сбросить игру</button>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="color: var(--accent)">Пьедестал почета</h2>
            <div id="results-list"></div>
            <button class="btn-main" onclick="document.getElementById('modal').style.display='none'" style="margin-top:30px; background: #334155;">Вернуться к игре</button>
        </div>
    </div>

    <script>
        const points = [10, 20, 30, 40, 50];
        let gameState = JSON.parse(localStorage.getItem('gameData_dark')) || {
            teams: ["Команда 1", "Команда 2", "Команда 3", "Команда 4", "Команда 5", "Команда 6"],
            scores: [0, 0, 0, 0, 0, 0],
            warnings: [0, 0, 0, 0, 0, 0]
        };

        function render() {
            const container = document.getElementById('scoreboard');
            container.innerHTML = '';
            gameState.teams.forEach((name, i) => {
                const card = document.createElement('div');
                card.className = 'team-card';
                card.innerHTML = `
                    <input class="team-name" value="${name}" onchange="updateName(${i}, this.value)">
                    <div class="score">${gameState.scores[i]}</div>
                    <div class="controls">
                        ${points.map(p => `<button class="btn-plus" onclick="changeScore(${i}, ${p})">+${p}</button>`).join('')}
                        <button class="btn-warning" onclick="addWarning(${i})">⚠ ПРЕДУПРЕЖДЕНИЕ</button>
                    </div>
                    <div class="warning-count">Нарушений: ${gameState.warnings[i]}</div>
                `;
                container.appendChild(card);
            });
            localStorage.setItem('gameData_dark', JSON.stringify(gameState));
        }

        function changeScore(i, amt) {
            gameState.scores[i] += amt;
            render();
        }

        function updateName(i, val) {
            gameState.teams[i] = val;
            localStorage.setItem('gameData_dark', JSON.stringify(gameState));
        }

        function addWarning(i) {
            gameState.warnings[i]++;
            if (gameState.warnings[i] >= 2) {
                gameState.scores[i] -= 20;
            }
            render();
        }

        function showResults() {
            const list = document.getElementById('results-list');
            const sorted = gameState.teams.map((name, i) => ({ name, score: gameState.scores[i] }))
                                        .sort((a, b) => b.score - a.score);
            
            list.innerHTML = sorted.map((t, i) => `
                <div class="winner-item ${i === 0 ? 'first' : ''}">
                    ${i === 0 ? '🥇' : (i+1 + '.')} ${t.name} — ${t.score}
                </div>
            `).join('');
            document.getElementById('modal').style.display = 'flex';
        }

        function resetScores() {
            if(confirm("Все данные будут удалены. Начать заново?")) {
                gameState.scores = new Array(6).fill(0);
                gameState.warnings = new Array(6).fill(0);
                render();
            }
        }

        render();
    </script>
</body>
</html>
