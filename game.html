<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EcLab 2.0 | Викторина</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-logo {
            font-size: 48px;
            font-weight: 800;
            color: #38bdf8;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        /* Сетка: ровно 2 колонки */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .team-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .team-name {
            font-size: 24px;
            font-weight: bold;
            background: transparent;
            color: #fff;
            border: none;
            border-bottom: 2px solid #334155;
            width: 80%;
            text-align: center;
            margin-bottom: 10px;
        }

        .members-wrap { color: #94a3b8; font-size: 14px; margin-bottom: 15px; }
        
        .members-input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #38bdf8;
            width: 50px;
            border-radius: 5px;
            text-align: center;
        }

        .score {
            font-size: 80px;
            font-weight: 900;
            color: #fff;
            margin: 10px 0;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .btn-add {
            background: #334155;
            border: none;
            color: #fff;
            padding: 12px 0;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-add:hover { background: #38bdf8; color: #000; }

        .btn-warn {
            grid-column: span 5;
            margin-top: 15px;
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .footer { margin-top: 50px; display: flex; gap: 30px; align-items: center; }
        
        .btn-finish {
            background: #38bdf8;
            color: #000;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 20px;
            border: none;
            cursor: pointer;
        }

        /* Окно итогов */
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            border: 2px solid #38bdf8;
        }
        .res-row {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #334155;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="header-logo">EcLab 2.0 Викторина</div>
    
    <div class="grid" id="container"></div>

    <div class="footer">
        <button class="btn-finish" onclick="showResults()">ИТОГИ ИГРЫ</button>
        <div style="color: #64748b; cursor: pointer;" onclick="resetGame()">Сбросить всё</div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 style="text-align:center; color:#38bdf8">Результаты</h2>
            <div id="results-list"></div>
            <button class="btn-finish" style="width:100%; margin-top:20px" onclick="document.getElementById('modal').style.display='none'">Закрыть</button>
        </div>
    </div>

    <script>
        const points = [10, 20, 30, 40, 50];
        let state = JSON.parse(localStorage.getItem('ec_lab_final')) || {
            teams: ["Команда 1", "Команда 2", "Команда 3", "Команда 4", "Команда 5", "Команда 6"],
            scores: [0, 0, 0, 0, 0, 0],
            warnings: [0, 0, 0, 0, 0, 0],
            members: [1, 1, 1, 1, 1, 1]
        };

        function render() {
            const container = document.getElementById('container');
            container.innerHTML = '';
            state.teams.forEach((name, i) => {
                container.innerHTML += `
                    <div class="team-card">
                        <input class="team-name" value="${name}" onchange="update('teams', ${i}, this.value)">
                        <div class="members-wrap">
                            Участников: <input type="number" class="members-input" value="${state.members[i]}" onchange="update('members', ${i}, this.value)">
                        </div>
                        <div class="score">${state.scores[i]}</div>
                        <div class="controls">
                            ${points.map(p => `<button class="btn-add" onclick="addScore(${i}, ${p})">+${p}</button>`).join('')}
                            <button class="btn-warn" onclick="doWarn(${i})">⚠ ПРЕДУПРЕЖДЕНИЕ (${state.warnings[i]})</button>
                        </div>
                    </div>
                `;
            });
            localStorage.setItem('ec_lab_final', JSON.stringify(state));
        }

        function update(key, i, val) { state[key][i] = val; render(); }
        function addScore(i, p) { state.scores[i] += p; render(); }
        function doWarn(i) {
            state.warnings[i]++;
            if(state.warnings[i] >= 2) state.scores[i] -= 20;
            render();
        }

        function showResults() {
            const list = document.getElementById('results-list');
            const sorted = state.teams.map((name, i) => ({
                name, score: state.scores[i]
            })).sort((a, b) => b.score - a.score);

            list.innerHTML = sorted.map((t, i) => {
                let m = i === 0 ? '🥇' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : ''));
                return `<div class="res-row"><span>${m} ${t.name}</span> <b>${t.score}</b></div>`;
            }).join('');
            document.getElementById('modal').style.display = 'flex';
        }

        function resetGame() { if(confirm("Очистить результаты?")) { localStorage.removeItem('ec_lab_final'); location.reload(); } }
        
        render();
    </script>
</body>
</html>
