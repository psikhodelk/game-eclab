<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Планшет Игрока — Бизнес-Выживалити</title>
    <style>
        :root {
            --bg-color: #1e222b;
            --card-bg: #282c34;
            --accent-color: #4a5568;
            --text-color: #ffffff;
            --text-muted: #a0aec0;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f1115;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Размеры стандартного печатного планшета А5 (горизонтальный) */
        .player-board {
            width: 800px;
            height: 530px;
            background-color: var(--card-bg);
            border: 4px solid #3e4451;
            border-radius: 16px;
            padding: 30px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Верхняя зона для карточки Сектора */
        .sector-zone {
            border: 3px dashed #5c6370;
            background-color: var(--bg-color);
            border-radius: 12px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sector-zone span {
            color: var(--text-muted);
            font-size: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Контейнер для шкал */
        .tracks-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 20px;
        }

        /* Строка параметра */
        .track-row {
            display: flex;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.15);
            padding: 12px 20px;
            border-radius: 10px;
            border-left: 5px solid var(--accent-color);
        }

        /* Название параметра */
        .track-label {
            width: 150px;
            color: var(--text-color);
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Сетка кружочков от 0 до 10 */
        .track-values {
            display: flex;
            justify-content: space-between;
            flex-grow: 1;
            padding-left: 20px;
        }

        .value-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #4b5263;
            background-color: var(--bg-color);
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="player-board">
        <!-- Место для карточки сектора -->
        <div class="sector-zone">
            <span>[ Место для карточки сектора ]</span>
        </div>

        <!-- Три шкалы ресурсов -->
        <div class="tracks-container">
            
            <!-- КАПИТАЛ -->
            <div class="track-row" style="border-left-color: #4caf50;">
                <div class="track-label">💵 Капитал</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

            <!-- РЕПУТАЦИЯ -->
            <div class="track-row" style="border-left-color: #2196f3;">
                <div class="track-label">⭐ Репутация</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

            <!-- МОЩНОСТЬ -->
            <div class="track-row" style="border-left-color: #ff9800;">
                <div class="track-label">⚡ Мощность</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
