<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EcLab 2.0 | Pro Edition</title>
    <!-- Подключаем библиотеку для фейерверков -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root {
            --bg: #030712;
            --card: #111827;
            --accent: linear-gradient(135deg, #4ade80 0%, #38bdf8 100%);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(74, 222, 128, 0.1) 0px, transparent 50%);
            color: #f8fafc; margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header-logo {
            font-size: 72px; font-weight: 900; letter-spacing: -3px;
            background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px; filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.3));
        }

        .stats-bar {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            padding: 10px 25px; border-radius: 100px; font-size: 14px;
            color: #94a3b8; margin-bottom: 40px; backdrop-filter: blur(5px);
        }

        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 30px; width: 100%; max-width: 1000px;
        }

        .team-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 32px; padding: 35px; position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .team-card:hover { transform: translateY(-5px); border-color: rgba(56, 189, 248, 0.4); }

        .team-card::before {
            content: ''; position: absolute; inset: 0; border-radius: 32px;
            padding: 2px; background: var(--accent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out; mask-composite: exclude;
            opacity: 0.3;
        }

        .team-name {
            font-size: 32px; font-weight: 800; background: transparent;
            color: #fff; border: none; border-bottom: 2px solid var(--border);
            width: 100%; text-align: center; margin-bottom: 12px; transition: 0.3s;
        }
        .team-name:focus { outline: none; border-bottom-color: #38bdf8; }

        .m-wrap { font-size: 13px; color: #64748b; text-transform: uppercase; font-weight: 600; }
        .m-input {
            background: #030712; border: 1px solid var(--border);
            color: #4ade80; width: 55px; border-radius: 8px;
            text-align: center; font-weight: 800; padding: 5px; margin-left: 5px;
        }

        .score {
            font-size: 100px; font-weight: 950; margin: 20px 0;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .controls { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .btn-add {
            background: #1f2937; border: 1px solid var(--border);
            color: #fff; padding: 16px 0; border-radius: 14px;
            font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-add:hover { background: #fff; color: #000; transform: translateY(-2px); }

        .btn-warn {
            grid-column: span 5; margin-top: 15px; background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444;
            padding: 12px; border-radius: 14px; cursor: pointer; font-size: 11px;
            font-weight: bold; transition: 0.3s;
        }
        .btn-warn:hover { background: #ef4444; color: #fff; }

        .footer { margin-top: 60px; display: flex; align-items: center; gap: 40px; }
        .btn-finish {
            background: var(--accent); color: #000; padding: 20px 60px;
            border-radius: 20px; font-weight: 900; font-size: 1.4rem;
            border: none; cursor: pointer; transition: 0.4s;
            box-shadow: 0 10px 40px rgba(56, 189, 248, 0.4);
        }
        .btn-finish:hover { transform: scale(1.05) rotate(-1deg); filter: brightness(1.1); }

        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #111827; padding: 50px; border-radius: 40px;
            width: 480px; border: 1px solid var(--border); text-align: center;
            box-shadow: 0 0 100px rgba(56, 189, 248, 0.2);
        }
        .res-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 22px; border-bottom: 1px solid var(--border); font-size: 24px;
        }
        .winner { color: #4ade80; font-weight: 900; font-size: 32px; }
    </style>
</head>
<body>

    <div class="header-logo">EcLab 2.0</div>
    <div class="stats-bar">👥 ВСЕГО УЧАСТНИКОВ: <span id="total-count" style="color: #4ade80; font-weight: 800;">0</span></div>
    
    <div class="grid" id="board"></div>

    <div class="footer">
        <button class="btn-finish" onclick="celebrate()">ИТОГИ ИГРЫ</button>
        <div style="color: #475569; cursor: pointer; font-weight: 600;" onclick="reset()">Сброс данных</div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 style="font-size: 36px; margin-bottom: 30px; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Пьедестал</h2>
            <div id="final-results"></div>
            <button class="btn-finish" style="width: 100%; margin-top: 30px; font-size: 1rem; padding: 15px;" onclick="document.getElementById('modal').style.display='none'">Вернуться к командам</button>
        </div>
    </div>

    <script>
        const points =;
        let db = JSON.parse(localStorage.getItem('eclab_v4_pro')) || {
            teams: ["Team Alpha", "Team Beta", "Team Gamma", "Team Delta", "Team Epsilon", "Team Zeta"],
            scores: Array(6).fill(0),
            warnings: Array(6).fill(0),
            members: Array(6).fill(0) // Теперь по умолчанию 0
        };

        function draw() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            let total = 0;

            db.teams.forEach((name, i) => {
                total += parseInt(db.members[i] || 0);
                board.innerHTML += `
                    <div class="team-card">
                        <input class="team-name" value="${name}" onchange="upd('teams', ${i}, this.value)">
                        <div class="m-wrap">
                            Участников: <input type="number" class="m-input" value="${db.members[i]}" onchange="upd('members', ${i}, this.value)">
                        </div>
                        <div class="score">${db.scores[i]}</div>
                        <div class="controls">
                            ${points.map(p => `<button class="btn-add" onclick="add(${i}, ${p})">+${p}</button>`).join('')}
                            <button class="btn-warn" onclick="warn(${i})">⚠ НАРУШЕНИЯ: ${db.warnings[i]}</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('total-count').innerText = total;
            localStorage.setItem('eclab_v4_pro', JSON.stringify(db));
        }

        function upd(key, i, val) { db[key][i] = val; draw(); }
        function add(i, p) { db.scores[i] += p; draw(); }
        function warn(i) {
            db.warnings[i]++;
            if(db.warnings[i] >= 2) db.scores[i] -= 20;
            draw();
        }

        function celebrate() {
            // Эффект фейерверка
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#4ade80', '#38bdf8'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#4ade80', '#38bdf8'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            // Показ результатов
            const list = document.getElementById('final-results');
            const sorted = db.teams.map((name, i) => ({
                name, score: db.scores[i]
            })).sort((a, b) => b.score - a.score);

            list.innerHTML = sorted.map((t, i) => {
                let m = i === 0 ? '🥇' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : '🔹'));
                let cls = i === 0 ? 'winner' : '';
                return `<div class="res-row ${cls}"><span>${m} ${t.name}</span> <b>${t.score}</b></div>`;
            }).join('');
            
            document.getElementById('modal').style.display = 'flex';
        }

        function reset() { if(confirm("Сбросить текущую игру?")) { localStorage.removeItem('eclab_v4_pro'); location.reload(); } }
        
        draw();
    </script>
</body>
</html>
