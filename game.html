<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Планшет Игрока — Бизнес-Выживалити</title>
    <style>
        :root {
            --bg-page: #f4f6f9;
            --board-bg: #ffffff;
            --text-main: #1a202c;
            --text-muted: #718096;
            --border-color: #e2e8f0;
            
            /* Градиенты для шкал */
            --grad-capital: linear-gradient(135deg, #2ecc71, #27ae60);
            --grad-reputation: linear-gradient(135deg, #3498db, #2980b9);
            --grad-power: linear-gradient(135deg, #e67e22, #d35400);
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Планшет А5 (горизонтальный, оптимизирован для печати) */
        .player-board {
            width: 800px;
            height: 530px;
            background-color: var(--board-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 35px;
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            background-image: radial-gradient(#e2e8f0 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }

        /* Яркая плашка для карточки Сектора */
        .sector-zone {
            border: 3px dashed #b2bec3;
            background-color: #f8f9fa;
            border-radius: 16px;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .sector-zone span {
            color: #636e72;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Контейнер для шкал ресурсов */
        .tracks-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 15px;
        }

        /* Стильная объемная строка параметра */
        .track-row {
            display: flex;
            align-items: center;
            background: #ffffff;
            padding: 16px 24px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        /* Цветная декоративная полоса слева */
        .track-row::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 8px;
        }

        .row-capital::before { background: var(--grad-capital); }
        .row-reputation::before { background: var(--grad-reputation); }
        .row-power::before { background: var(--grad-power); }

        /* Название параметра */
        .track-label {
            width: 140px;
            color: var(--text-main);
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Сетка кружочков */
        .track-values {
            display: flex;
            justify-content: space-between;
            flex-grow: 1;
            padding-left: 15px;
        }

        /* Крупные, сочные кружочки для фишек */
        .value-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #dfe6e9;
            background-color: #f8f9fa;
            color: #2d3436;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 700;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        /* Выделение финальной десятки как цели */
        .value-circle:last-child {
            border-color: #ffb142;
            background-color: #fff9e6;
            color: #cc8e35;
        }
    </style>
</head>
<body>

    <div class="player-board">
        <!-- Место для карточки сектора -->
        <div class="sector-zone">
            <span>[ МЕСТО ДЛЯ КАРТОЧКИ СЕКТОРА ]</span>
        </div>

        <!-- Три шкалы ресурсов -->
        <div class="tracks-container">
            
            <!-- КАПИТАЛ -->
            <div class="track-row row-capital">
                <div class="track-label">💵 КАПИТАЛ</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

            <!-- РЕПУТАЦИЯ -->
            <div class="track-row row-reputation">
                <div class="track-label">⭐ РЕПУТ.</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

            <!-- МОЩНОСТЬ -->
            <div class="track-row row-power">
                <div class="track-label">⚡ МОЩН.</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
