<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EcLab 2.0 | Pro Edition</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root {
            --bg: #05070a;
            --card: #111827; /* Глубокий темно-серый, 100% видимый */
            --accent-green: #4ade80;
            --accent-blue: #38bdf8;
            --border: #1e293b;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            /* Мягкое свечение на фоне для объема */
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #05070a);
            color: #f8fafc; margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header-logo {
            font-size: 72px; font-weight: 900; letter-spacing: -3px;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px; text-transform: uppercase;
        }

        .stats-bar {
            background: #1e293b; border: 1px solid var(--border);
            padding: 10px 25px; border-radius: 100px; font-size: 14px;
            color: #94a3b8; margin-bottom: 40px;
        }

        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 30px; width: 100%; max-width: 1000px;
        }

        .team-card {
            background: var(--card); /* Сплошной фон без прозрачности */
            border: 2px solid var(--border);
            border-radius: 32px; padding: 35px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        /* Яркая полоска сверху для стиля */
        .team-card::after {
            content: ''; position: absolute; top: -2px; left: 40px; right: 40px; height: 4px;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
            border-radius: 0 0 10px 10px;
        }

        .team-name {
            font-size: 32px; font-weight: 800; background: transparent;
            color: #fff; border: none; border-bottom: 2px solid var(--border);
            width: 100%; text-align: center; margin-bottom: 12px;
        }

        .m-wrap { font-size: 13px; color: #64748b; text-transform: uppercase; font-weight: bold; }
        .m-input {
            background: #05070a; border: 1px solid var(--accent-green);
            color: var(--accent-green); width: 55px; border-radius: 8px;
            text-align: center; font-weight: 800; padding: 5px;
        }

        .score {
            font-size: 100px; font-weight: 950; margin: 20px 0; color: #fff;
            text-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
        }

        .controls { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .btn-add {
            background: #1f2937; border: 1px solid var(--border);
            color: #fff; padding: 16px 0; border-radius: 14px;
            font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-add:hover { background: #fff; color: #000; }

        .btn-warn {
            grid-column: span 5; margin-top: 15px; background: transparent;
            border: 1px solid #ef4444; color: #ef4444;
            padding: 12px; border-radius: 14px; cursor: pointer; font-size: 11px;
        }

        .btn-finish {
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
            color: #05070a; padding: 20px 60px; border-radius: 20px;
            font-weight: 900; font-size: 1.4rem; border: none; cursor: pointer;
            box-shadow: 0 10px 40px rgba(56, 189, 248, 0.3);
        }

        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #111827; padding: 50px; border-radius: 40px;
            width: 480px; border: 2px solid var(--accent-blue); text-align: center;
        }
        .res-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 22px; border-bottom: 1px solid var(--border); font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="header-logo">EcLab 2.0</div>
    <div class="stats-bar">👥 ВСЕГО УЧАСТНИКОВ: <span id="total-count" style="color: #4ade80; font-weight: 800;">0</span></div>
    
    <div class="grid" id="board"></div>

    <div class="footer" style="margin-top: 60px; display: flex; align-items: center; gap: 40px;">
        <button class="btn-finish" onclick="celebrate()">ИТОГИ ИГРЫ</button>
        <div style="color: #475569; cursor: pointer;" onclick="reset()">Сброс данных</div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 style="font-size: 36px; color: var(--accent-blue);">Результаты</h2>
            <div id="final-results"></div>
            <button class="btn-finish" style="width: 100%; margin-top: 30px; font-size: 1rem;" onclick="document.getElementById('modal').style.display='none'">Вернуться</button>
        </div>
    </div>

    <script>
        const points =;
        let db = JSON.parse(localStorage.getItem('eclab_v5_final')) || {
            teams: ["Team 1", "Team 2", "Team 3", "Team 4", "Team 5", "Team 6"],
            scores: Array(6).fill(0),
            warnings: Array(6).fill(0),
            members: Array(6).fill(0) 
        };

        function draw() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            let total = 0;

            db.teams.forEach((name, i) => {
                total += parseInt(db.members[i] || 0);
                board.innerHTML += `
                    <div class="team-card">
                        <input class="team-name" value="${name}" onchange="upd('teams', ${i}, this.value)">
                        <div class="m-wrap">
                            Участников: <input type="number" class="m-input" value="${db.members[i]}" onchange="upd('members', ${i}, this.value)">
                        </div>
                        <div class="score">${db.scores[i]}</div>
                        <div class="controls">
                            ${points.map(p => `<button class="btn-add" onclick="add(${i}, ${p})">+${p}</button>`).join('')}
                            <button class="btn-warn" onclick="warn(${i})">⚠ НАРУШЕНИЯ: ${db.warnings[i]}</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('total-count').innerText = total;
            localStorage.setItem('eclab_v5_final', JSON.stringify(db));
        }

        function upd(key, i, val) { db[key][i] = val; draw(); }
        function add(i, p) { db.scores[i] += p; draw(); }
        function warn(i) {
            db.warnings[i]++;
            if(db.warnings[i] >= 2) db.scores[i] -= 20;
            draw();
        }

        function celebrate() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#4ade80', '#38bdf8'] });
            
            const list = document.getElementById('final-results');
            const sorted = db.teams.map((name, i) => ({
                name, score: db.scores[i]
            })).sort((a, b) => b.score - a.score);

            list.innerHTML = sorted.map((t, i) => {
                let m = i === 0 ? '🥇' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : '🔹'));
                return `<div class="res-row"><span>${m} ${t.name}</span> <b>${t.score}</b></div>`;
            }).join('');
            
            document.getElementById('modal').style.display = 'flex';
        }

        function reset() { if(confirm("Сбросить игру?")) { localStorage.removeItem('eclab_v5_final'); location.reload(); } }
        draw();
    </script>
</body>
</html>
