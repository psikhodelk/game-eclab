<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Планшет Игрока — Бизнес-Выживалити</title>
    <style>
        :root {
            --bg-page: #f2f4f8;
            --board-bg: #ffffff;
            --brand-yellow: #fcd116; 
            --brand-black: #141416;  
            --text-muted: #64748b;
            --border-main: 2px solid #141416;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Современный журнальный планшет */
        .player-board {
            width: 840px;
            height: 540px;
            background-color: var(--board-bg);
            border: var(--border-main);
            border-radius: 20px; 
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 8px 8px 0px var(--brand-black); 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            /* Дорогой эффект графического шума на фоне */
            background-image: radial-gradient(rgba(20, 20, 22, 0.15) 1px, transparent 0);
            background-size: 8px 8px;
        }

        /* Стильный косой блок в стиле вашего референса */
        .player-board::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 140px;
            background: var(--brand-yellow);
            border-bottom: var(--border-main);
            transform: skewY(-2deg);
            transform-origin: top left;
            z-index: 1;
        }

        /* Минималистичная зона для карточки Сектора */
        .sector-zone {
            border: 2px dashed rgba(20, 20, 22, 0.4);
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            position: relative;
            margin-top: -10px;
            box-shadow: 4px 4px 0px var(--brand-black);
        }

        .sector-zone span {
            color: var(--brand-black);
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Контейнер для шкал ресурсов */
        .tracks-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 25px;
            z-index: 2;
        }

        /* Аккуратная, легкая строка параметра */
        .track-row {
            display: flex;
            align-items: center;
            background: #ffffff;
            padding: 14px 24px;
            border: var(--border-main);
            border-radius: 14px;
            box-shadow: 4px 4px 0px var(--brand-black);
        }

        /* Название параметра современным жирным шрифтом */
        .track-label {
            width: 160px;
            color: var(--brand-black);
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Сетка кружочков */
        .track-values {
            display: flex;
            justify-content: space-between;
            flex-grow: 1;
            padding-left: 10px;
        }

        /* Идеально круглые аккуратные ячейки */
        .value-circle {
            width: 36px;
            height: 36px;
            border: 2px solid var(--brand-black);
            border-radius: 50%;
            background-color: #ffffff;
            color: var(--brand-black);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.15s ease;
        }

        /* Выделение финальной десятки */
        .value-circle:last-child {
            background-color: var(--brand-yellow);
        }
    </style>
</head>
<body>

    <div class="player-board">
        <!-- Место для карточки сектора -->
        <div class="sector-zone">
            <span>[ место для карточки сектора ]</span>
        </div>

        <!-- Три шкалы ресурсов -->
        <div class="tracks-container">
            
            <!-- КАПИТАЛ -->
            <div class="track-row">
                <div class="track-label"><span>💵</span> КАПИТАЛ</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

            <!-- РЕПУТАЦИЯ -->
            <div class="track-row">
                <div class="track-label"><span>⭐</span> РЕПУТАЦИЯ</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

            <!-- МОЩНОСТЬ -->
            <div class="track-row">
                <div class="track-label"><span>⚡</span> МОЩНОСТЬ</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
