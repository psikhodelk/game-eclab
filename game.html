<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Планшет Игрока — Бизнес-Выживалити</title>
    <style>
        :root {
            --bg-page: #f4f5f7;
            --board-bg: #ffffff;
            --text-black: #000000;
            --accent-pink: #ff1e56;   /* Яркий малиновый из референса */
            --accent-blue: #00b4d8;   /* Электрический синий */
            --accent-yellow: #ffac41; /* Сочный оранжево-желтый */
        }
        
        body {
            font-family: 'Arial Black', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Плотный журнальный дашборд */
        .player-board {
            width: 840px;
            height: 540px;
            background-color: var(--board-bg);
            border: 4px solid var(--text-black);
            padding: 35px;
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Зона для карточки Сектора — массивная, с толстым контуром */
        .sector-zone {
            background-color: #ffffff;
            border: 4px solid var(--text-black);
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .sector-zone span {
            color: var(--text-black);
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Контейнер для трех шкал */
        .tracks-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        /* Монолитный, тяжелый блок шкалы */
        .track-row {
            display: flex;
            align-items: stretch;
            border: 4px solid var(--text-black);
            height: 64px;
            box-sizing: border-box;
            background: #ffffff;
        }

        /* Левый глухой блок с названием на цветном фоне */
        .track-label {
            width: 180px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            text-align: center;
            border-right: 4px solid var(--text-black);
        }
        .row-capital .track-label { background-color: var(--accent-pink); }
        .row-reputation .track-label { background-color: var(--accent-blue); }
        .row-power .track-label { background-color: var(--accent-yellow); }

        /* Пространство для ячеек со штрихованным дизайнерским фоном из референса */
        .track-values {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-grow: 1;
            padding: 0 15px;
            /* Стильная тонкая штриховка на фоне дорожки */
            background: repeating-linear-gradient(
                -45deg,
                #ffffff,
                #ffffff 8px,
                #f1f5f9 8px,
                #f1f5f9 9px
            );
        }

        /* Крупные, массивные ячейки-кнопки */
        .value-circle {
            width: 40px;
            height: 40px;
            border: 3px solid var(--text-black);
            background-color: #ffffff;
            color: var(--text-black);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 900;
            position: relative;
        }

        /* Последняя ячейка «10» полностью залита черным — для супер-контраста */
        .value-circle:last-child {
            background-color: var(--text-black);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="player-board">
        <!-- Место для карточки сектора -->
        <div class="sector-zone">
            <span>[ МЕСТО ДЛЯ КАРТОЧКИ СЕКТОРА ]</span>
        </div>

        <!-- Три шкалы ресурсов -->
        <div class="tracks-container">
            
            <!-- КАПИТАЛ -->
            <div class="track-row row-capital">
                <div class="track-label">💵 КАПИТАЛ</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

            <!-- РЕПУТАЦИЯ -->
            <div class="track-row row-reputation">
                <div class="track-label">⭐ РЕПУТАЦИЯ</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

            <!-- МОЩНОСТЬ -->
            <div class="track-row row-power">
                <div class="track-label">⚡ МОЩНОСТЬ</div>
                <div class="track-values">
                    <div class="value-circle">0</div><div class="value-circle">1</div><div class="value-circle">2</div><div class="value-circle">3</div><div class="value-circle">4</div><div class="value-circle">5</div><div class="value-circle">6</div><div class="value-circle">7</div><div class="value-circle">8</div><div class="value-circle">9</div><div class="value-circle">10</div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
