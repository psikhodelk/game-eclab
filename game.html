<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Итоги: Экономическая игра</title>
    <style>
        :root {
            --bg: #1e293b;
            --card: #334155;
            --text: #f1f5f9;
            --border: #475569;
            --accent: #94a3b8;
            --gold: #fbbf24;
            --silver: #94a3b8;
            --bronze: #a855f7; /* или #cd7f32 */
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 30px; margin: 0;
        }

        h1 { font-weight: 300; letter-spacing: 1px; margin-bottom: 40px; color: var(--text); }

        .grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 20px; width: 100%; max-width: 1200px; 
        }

        .team-card { 
            background: var(--card); border: 1px solid var(--border);
            padding: 20px; border-radius: 8px; text-align: center;
        }

        .team-name { 
            font-size: 1.3em; background: transparent; color: var(--text);
            border: none; border-bottom: 1px solid var(--border);
            text-align: center; width: 90%; margin-bottom: 10px; padding: 5px;
        }

        .members-input {
            background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            color: #94a3b8; font-size: 0.8em; width: 60px; 
            text-align: center; border-radius: 4px; margin-bottom: 15px;
        }

        .score { font-size: 3.5em; font-weight: 200; margin: 10px 0; color: #fff; }

        .controls { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }

        button { 
            cursor: pointer; border: 1px solid var(--border); 
            background: transparent; color: var(--text); 
            padding: 10px 0; border-radius: 4px; transition: 0.2s;
        }
        button:hover { background: var(--border); }

        .btn-warning { grid-column: span 5; margin-top: 10px; font-size: 0.8em; color: #cbd5e1; }
        .warning-label { font-size: 0.75em; color: #64748b; margin-top: 8px; }

        .footer { margin-top: 50px; display: flex; gap: 15px; }
        .btn-action { padding: 12px 30px; background: #475569; border: none; font-size: 1em; }
        .btn-action:hover { background: #64748b; }

        /* Модальное окно */
        #modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.95); 
            justify-content: center; align-items: center; z-index: 1000; 
        }
        .modal-content { 
            background: var(--card); padding: 40px; border-radius: 12px; 
            width: 90%; max-width: 500px; border: 1px solid var(--border);
        }
        .result-row { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid var(--border); font-size: 1.2em;
        }
        .medal { font-size: 1.5em; margin-right: 10px; }
    </style>
</head>
<body>

    <h1>ИТОГИ ИГРЫ</h1>
    
    <div class="grid" id="main-grid"></div>

    <div class="footer">
        <button class="btn-action" onclick="showFinal()">ПОДВЕСТИ ИТОГИ</button>
        <button onclick="resetAll()" style="color: #64748b; border: none; background: none; cursor:pointer;">Сброс</button>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 style="text-align: center; margin-top: 0;">Результаты</h2>
            <div id="results-box"></div>
            <button class="btn-action" style="width: 100%; margin-top: 20px;" onclick="document.getElementById('modal').style.display='none'">Закрыть</button>
        </div>
    </div>

    <script>
        const points = [10, 20, 30, 40, 50];
        let data = JSON.parse(localStorage.getItem('game_v3')) || {
            teams: Array(6).fill("").map((_, i) => `Команда ${i+1}`),
            scores: Array(6).fill(0),
            warnings: Array(6).fill(0),
            members: Array(6).fill(5) // Кол-во участников по умолчанию
        };

        function render() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            data.teams.forEach((name, i) => {
                grid.innerHTML += `
                    <div class="team-card">
                        <input class="team-name" value="${name}" onchange="update('teams', ${i}, this.value)">
                        <div>
                           <span style="font-size:0.7em">Участников:</span>
                           <input type="number" class="members-input" value="${data.members[i]}" onchange="update('members', ${i}, this.value)">
                        </div>
                        <div class="score">${data.scores[i]}</div>
                        <div class="controls">
                            ${points.map(p => `<button onclick="addScore(${i}, ${p})">+${p}</button>`).join('')}
                            <button class="btn-warning" onclick="warn(${i})">ПРЕДУПРЕЖДЕНИЕ</button>
                        </div>
                        <div class="warning-label">Нарушений: ${data.warnings[i]}</div>
                    </div>
                `;
            });
            localStorage.setItem('game_v3', JSON.stringify(data));
        }

        function update(field, i, val) { data[field][i] = val; render(); }

        function addScore(i, p) { data.scores[i] += p; render(); }

        function warn(i) {
            data.warnings[i]++;
            if(data.warnings[i] >= 2) data.scores[i] -= 20;
            render();
        }

        function showFinal() {
            const box = document.getElementById('results-box');
            const sorted = data.teams.map((name, i) => ({
                name, score: data.scores[i], members: data.members[i]
            })).sort((a, b) => b.score - a.score);

            box.innerHTML = sorted.map((t, i) => {
                let medal = "";
                if (i === 0) medal = "🥇";
                else if (i === 1) medal = "🥈";
                else if (i === 2) medal = "🥉";
                
                return `
                    <div class="result-row">
                        <span>${medal} ${t.name} <br><small style="color:#64748b; font-size:0.6em">(${t.members} чел.)</small></span>
                        <span style="font-weight:bold">${t.score}</span>
                    </div>
                `;
            }).join('');
            document.getElementById('modal').style.display = 'flex';
        }

        function resetAll() {
            if(confirm("Очистить все данные?")) {
                localStorage.removeItem('game_v3');
                location.reload();
            }
        }

        render();
    </script>
</body>
</html>
